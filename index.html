<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Clock Station</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --clock-size: 360px;
  --accent: #38bdf8;
  --accent2: #a78bfa;
  --green: #4ade80;
  --panel-bg: rgba(8,10,20,0.82);
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.10);
  --text: rgba(255,255,255,0.9);
  --text-dim: rgba(255,255,255,0.4);
  --radius: 16px;
  --sidebar-w: 300px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;background:#050508;color:var(--text);height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;}
canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;}
#bg-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.18);z-index:1;pointer-events:none;}

/* ───── LEFT SIDEBAR ───── */
#left-trigger{position:fixed;left:0;top:0;width:28px;height:100vh;z-index:50;cursor:pointer;}
#left-panel{
  position:fixed;left:0;top:0;height:100vh;width:var(--sidebar-w);
  background:var(--panel-bg);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-right:1px solid var(--glass-border);z-index:49;
  transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#left-panel.open{transform:translateX(0);}
.panel-tabs{display:flex;border-bottom:1px solid var(--glass-border);flex-shrink:0;}
.ptab{flex:1;padding:14px 6px;text-align:center;font-size:18px;cursor:pointer;opacity:.4;transition:.2s;border-bottom:2px solid transparent;}
.ptab:hover{opacity:.75;}
.ptab.active{opacity:1;border-bottom-color:var(--accent);}
.tab-content{display:none;flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent;}
.tab-content.active{display:block;}

/* ───── SETTINGS TAB ───── */
.sec-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin:14px 0 7px;font-family:'JetBrains Mono',monospace;}
.sec-label:first-child{margin-top:0;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.btn{padding:9px 6px;border:1px solid var(--glass-border);border-radius:10px;cursor:pointer;background:var(--glass);color:var(--text);font-size:11.5px;font-family:'Space Grotesk',sans-serif;transition:.18s;text-align:center;line-height:1.35;}
.btn:hover{background:rgba(255,255,255,0.13);border-color:rgba(255,255,255,0.2);}
.btn.active{background:rgba(56,189,248,0.22);color:var(--accent);border-color:var(--accent);font-weight:600;}
.btn.full{grid-column:1/-1;font-size:13px;}
select,input[type=range]{width:100%;padding:8px 10px;border-radius:9px;background:rgba(0,0,0,0.35);border:1px solid var(--glass-border);color:var(--text);font-size:12px;font-family:'Space Grotesk',sans-serif;outline:none;cursor:pointer;appearance:none;}
select option{background:#0f1020;}
.vol-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.vol-row span{font-size:10px;color:var(--text-dim);white-space:nowrap;}
.hint{font-size:10px;color:var(--text-dim);margin-top:5px;text-align:center;min-height:14px;font-family:'JetBrains Mono',monospace;}
hr{border:none;border-top:1px solid var(--glass-border);margin:12px 0;}

/* ───── TODO TAB ───── */
#todo-input-row{display:flex;gap:6px;margin-bottom:10px;}
#todo-text{flex:1;padding:9px 12px;border-radius:10px;background:rgba(0,0,0,0.4);border:1px solid var(--glass-border);color:#fff;font-size:13px;font-family:'Space Grotesk',sans-serif;outline:none;}
#todo-text:focus{border-color:var(--accent);}
#todo-add-btn{padding:9px 14px;border-radius:10px;background:var(--accent);color:#000;font-weight:700;font-size:13px;cursor:pointer;border:none;font-family:'Space Grotesk',sans-serif;}
.color-pills{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.cpill{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;flex-shrink:0;}
.cpill.selected{border-color:#fff;transform:scale(1.2);}
#todo-list{display:flex;flex-direction:column;gap:6px;}
.todo-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:12px;border-left:3px solid;cursor:pointer;transition:.15s;position:relative;}
.todo-item:hover{filter:brightness(1.1);}
.todo-check{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.todo-check.done{background:rgba(255,255,255,0.3);border-color:transparent;}
.todo-check.done::after{content:'✓';font-size:10px;color:#fff;}
.todo-text-el{flex:1;font-size:13px;line-height:1.4;}
.todo-text-el.done{text-decoration:line-through;opacity:.45;}
.todo-del{opacity:0;font-size:11px;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,0.1);cursor:pointer;border:none;color:#fff;transition:.15s;}
.todo-item:hover .todo-del{opacity:.7;}
.todo-date{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}

/* ───── CALENDAR TAB ───── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav{background:var(--glass);border:1px solid var(--glass-border);color:#fff;border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.cal-title{font-size:14px;font-weight:600;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day-hdr{text-align:center;font-size:10px;color:var(--text-dim);padding:4px 0;font-family:'JetBrains Mono',monospace;}
.cal-day{text-align:center;padding:6px 2px;border-radius:8px;font-size:12px;cursor:pointer;transition:.15s;min-height:32px;position:relative;}
.cal-day:hover{background:var(--glass);}
.cal-day.today{background:rgba(56,189,248,0.2);color:var(--accent);font-weight:700;}
.cal-day.other-month{opacity:.28;}
.cal-day.has-event::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent);}
.bengali-date{font-size:8px;color:var(--accent2);display:block;font-family:'JetBrains Mono',monospace;line-height:1;}
.cal-toggle{display:flex;gap:6px;margin-bottom:10px;}
.cal-toggle-btn{flex:1;padding:6px;border-radius:8px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);font-size:11px;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.15s;}
.cal-toggle-btn.active{background:rgba(167,139,250,0.2);color:var(--accent2);border-color:var(--accent2);}
.event-form{background:rgba(0,0,0,0.3);border-radius:12px;padding:12px;margin-top:10px;border:1px solid var(--glass-border);}
.ev-input{width:100%;padding:8px 10px;border-radius:8px;background:rgba(0,0,0,0.4);border:1px solid var(--glass-border);color:#fff;font-size:12px;font-family:'Space Grotesk',sans-serif;outline:none;margin-bottom:6px;}
.ev-input:focus{border-color:var(--accent);}
.ev-colors{display:flex;gap:5px;margin-bottom:8px;}
.ev-col{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;}
.ev-col.selected{border-color:#fff;transform:scale(1.2);}
.ev-time-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.ev-save{width:100%;padding:8px;border-radius:8px;background:var(--accent);color:#000;font-weight:700;cursor:pointer;border:none;font-family:'Space Grotesk',sans-serif;font-size:13px;}
.events-list{margin-top:10px;display:flex;flex-direction:column;gap:5px;}
.event-item{padding:8px 10px;border-radius:10px;border-left:3px solid;font-size:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.event-item-del{opacity:0;font-size:10px;padding:2px 5px;border-radius:5px;background:rgba(255,255,255,0.1);cursor:pointer;border:none;color:#fff;}
.event-item:hover .event-item-del{opacity:.7;}

/* ───── TOP RIGHT BUTTONS ───── */
#top-right{position:fixed;top:16px;right:16px;z-index:48;display:flex;gap:8px;}
.icon-btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--glass-border);background:var(--panel-bg);backdrop-filter:blur(20px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:.18s;color:var(--text);}
.icon-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);}
.icon-btn.active{background:rgba(56,189,248,0.2);border-color:var(--accent);color:var(--accent);}

/* ───── GLOBE OVERLAY ───── */
#globe-overlay{position:fixed;inset:0;z-index:5;display:none;flex-direction:column;}
#globe-canvas{position:absolute;inset:0;width:100%;height:100%;}
#globe-ui{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:6;}
.globe-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--glass-border);background:var(--panel-bg);backdrop-filter:blur(20px);color:var(--text);cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12px;transition:.15s;}
.globe-btn:hover{background:rgba(255,255,255,0.1);}
.globe-btn.active{background:rgba(56,189,248,0.18);color:var(--accent);border-color:var(--accent);}
#globe-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5vw;font-weight:700;letter-spacing:.04em;font-family:'JetBrains Mono',monospace;color:#fff;text-shadow:0 0 40px rgba(0,0,0,.8);pointer-events:none;display:none;text-align:center;}
#globe-date-sub{font-size:1.5vw;color:rgba(255,255,255,0.6);display:block;margin-top:4px;font-weight:300;}

/* ───── CLOCK ───── */
#clock-wrapper{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;}
.clock-container{position:relative;width:var(--clock-size);height:var(--clock-size);display:flex;align-items:center;justify-content:center;}
.clock{position:relative;width:100%;height:100%;border-radius:50%;background:rgba(0,0,0,0.22);backdrop-filter:blur(8px);border:2px solid var(--glass-border);}
.face-tactical .dot{position:absolute;inset:10px;transform:rotate(calc(var(--i)*6deg));}
.face-tactical .dot::before{content:"";position:absolute;top:0;left:50%;width:2px;height:8px;background:rgba(255,255,255,0.3);transform:translateX(-50%);}
.face-tactical .dot:nth-child(5n)::before{height:15px;background:#fff;width:3px;}
.face-tactical label{position:absolute;inset:40px;text-align:center;transform:rotate(calc(var(--i)*30deg));}
.face-tactical label span{display:inline-block;font-size:2.4rem;font-weight:700;transform:rotate(calc(var(--i)*-30deg));font-family:'JetBrains Mono',monospace;}
.face-minimal .dot{position:absolute;inset:10px;transform:rotate(calc(var(--i)*6deg));}
.face-minimal .dot::before{content:"";position:absolute;top:0;left:50%;width:1px;height:6px;background:rgba(255,255,255,0.4);transform:translateX(-50%);}
.face-minimal .dot:nth-child(5n)::before{height:12px;background:rgba(255,255,255,0.9);width:2px;}
.face-minimal label{position:absolute;inset:40px;text-align:center;transform:rotate(calc(var(--i)*30deg));}
.face-minimal label span{display:inline-block;font-size:2rem;font-weight:300;color:rgba(255,255,255,0.85);transform:rotate(calc(var(--i)*-30deg));}
.face-classic .dot{position:absolute;inset:10px;transform:rotate(calc(var(--i)*6deg));}
.face-classic .dot::before{content:"";position:absolute;top:0;left:50%;width:2px;height:8px;background:rgba(255,255,255,0.25);transform:translateX(-50%);}
.face-classic .dot:nth-child(5n)::before{height:16px;background:#fff;width:3px;}
.face-classic label{position:absolute;inset:40px;text-align:center;transform:rotate(calc(var(--i)*30deg));}
.face-classic label span{display:inline-block;font-size:2.4rem;font-weight:700;color:#f5f5dc;transform:rotate(calc(var(--i)*-30deg));}
.hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;border-radius:10px;transform:translateX(-50%) rotate(0deg);}
.hour-hand{width:10px;height:25%;background:#38bdf8;z-index:3;}
.min-hand{width:7px;height:35%;background:#4ade80;z-index:2;}
.sec-hand{width:2px;height:40%;background:#fbbf24;z-index:4;}
.center-dot{position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;z-index:10;border:2px solid #000;top:50%;left:50%;transform:translate(-50%,-50%);}
.clock-hidden{visibility:hidden;}

/* ── CLOCK EDGE EVENTS ── */
#clock-events-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;border-radius:50%;}
.event-tooltip{position:fixed;background:var(--panel-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:10px;padding:8px 12px;font-size:12px;z-index:100;pointer-events:none;display:none;max-width:180px;}

/* ── CLOCK CONTROLS OVERLAY ── */
#clock-controls{position:absolute;bottom:-68px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;}
.ck-btn{padding:7px 14px;border-radius:10px;border:1px solid var(--glass-border);background:var(--panel-bg);backdrop-filter:blur(16px);color:var(--text);cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:11px;transition:.15s;white-space:nowrap;}
.ck-btn:hover{background:rgba(255,255,255,0.1);}
.ck-btn.active{background:rgba(56,189,248,0.18);color:var(--accent);border-color:var(--accent);}

/* ── TZ DROPDOWN ── */
#tz-popup{position:absolute;bottom:-130px;left:50%;transform:translateX(-50%);background:var(--panel-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:12px;padding:10px;z-index:20;display:none;min-width:240px;}
#tz-popup select{background:rgba(0,0,0,0.5);}

/* ── BACKGROUNDS MODAL ── */
#bg-modal{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);}
#bg-modal-inner{background:var(--panel-bg);border:1px solid var(--glass-border);border-radius:20px;padding:24px;width:min(700px,92vw);max-height:82vh;overflow-y:auto;}
#bg-modal-inner h3{margin-bottom:16px;font-size:18px;}
.bg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.bg-card{border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:.18s;aspect-ratio:16/9;position:relative;}
.bg-card:hover{border-color:rgba(255,255,255,0.3);}
.bg-card.selected{border-color:var(--accent);}
.bg-card img{width:100%;height:100%;object-fit:cover;}
.bg-card-label{position:absolute;bottom:0;left:0;right:0;padding:4px 8px;background:rgba(0,0,0,0.6);font-size:10px;color:#fff;}
.modal-close{float:right;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;margin-top:-4px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(10,12,24,0.9);border:1px solid var(--glass-border);backdrop-filter:blur(20px);border-radius:12px;padding:10px 20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}

/* ── LEFT PANEL PEEK TAB ── */
#left-peek{position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:51;display:flex;flex-direction:column;gap:6px;padding:8px 6px;background:var(--panel-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-left:none;border-radius:0 14px 14px 0;transition:opacity .2s;}
#left-panel.open + #left-peek{opacity:0;pointer-events:none;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
</style>
</head>
<body>

<canvas id="atm-canvas"></canvas>
<div id="bg-overlay"></div>

<!-- Globe Overlay -->
<div id="globe-overlay">
  <canvas id="globe-canvas"></canvas>
  <div id="globe-ui">
    <button class="globe-btn active" id="globe-close-btn" onclick="toggleGlobe()">✕ Close</button>
    <button class="globe-btn" id="globe-clock-toggle" onclick="toggleGlobeClock()">🕐 Show Clock</button>
  </div>
  <div id="globe-time"><span id="globe-time-text">--:--:--</span><span id="globe-date-sub"></span></div>
</div>

<!-- Left Peek Tab -->
<div id="left-peek">
  <div style="font-size:8px;color:var(--text-dim);text-align:center;letter-spacing:.1em;writing-mode:vertical-rl;margin:4px 0;">MENU</div>
  <div style="font-size:18px;text-align:center;cursor:pointer;" onclick="toggleLeftPanel('settings')" title="Settings">⚙️</div>
  <div style="font-size:18px;text-align:center;cursor:pointer;" onclick="toggleLeftPanel('todo')" title="To-Do">✅</div>
  <div style="font-size:18px;text-align:center;cursor:pointer;" onclick="toggleLeftPanel('calendar')" title="Calendar">📅</div>
</div>

<!-- Left Panel -->
<div id="left-panel">
  <div class="panel-tabs">
    <div class="ptab active" data-tab="settings" onclick="switchTab('settings')">⚙️</div>
    <div class="ptab" data-tab="todo" onclick="switchTab('todo')">✅</div>
    <div class="ptab" data-tab="calendar" onclick="switchTab('calendar')">📅</div>
  </div>

  <!-- SETTINGS TAB -->
  <div class="tab-content active" id="tab-settings">
    <div class="sec-label">Clock Size</div>
    <input type="range" id="sizeSlider" min="200" max="520" value="360">

    <div class="sec-label">Clock Style</div>
    <select id="styleSelect">
      <option value="face-tactical">Tactical (Blue / Green)</option>
      <option value="face-minimal">Minimalist White</option>
      <option value="face-classic">Classic Warm</option>
    </select>

    <hr>
    <div class="sec-label">Atmosphere Scene</div>
    <select id="atmSelect">
      <option value="none">⬛ None</option>
      <optgroup label="Rain">
        <option value="rain-window">🪟 Rain on Window</option>
        <option value="rain-night">🌃 Rainy Night City</option>
        <option value="rain-forest">🌿 Forest Rain</option>
        <option value="rain-heavy">⛈ Heavy Thunderstorm</option>
      </optgroup>
      <optgroup label="Snow">
        <option value="snow-cabin">🏠 Snowy Cabin Night</option>
        <option value="snow-blizzard">❄️ Blizzard</option>
      </optgroup>
      <optgroup label="Sky & Space">
        <option value="night-mountain">🏔 Night Mountain</option>
        <option value="deep-space">🌌 Deep Space Nebula</option>
        <option value="aurora">🌠 Aurora Borealis</option>
        <option value="sunset">🌅 Sunset Horizon</option>
      </optgroup>
      <optgroup label="Cozy">
        <option value="fireplace">🔥 Fireplace Glow</option>
        <option value="cafe">☕ Cozy Café Window</option>
      </optgroup>
    </select>

    <div class="sec-label" style="margin-top:8px;">Particles</div>
    <div class="g2">
      <button class="btn active" id="btn-particles" onclick="toggleParticles(this)">🌨 Particles On</button>
    </div>

    <hr>
    <div class="sec-label">Photo Backgrounds</div>
    <button class="btn full" onclick="openBgModal()">🖼 Choose Background Photo</button>

    <hr>
    <div class="sec-label">Ambient Sound</div>
    <div class="g2">
      <button class="btn" id="snd-rain" onclick="toggleSound('rain',this)">🌧 Rain</button>
      <button class="btn" id="snd-fire" onclick="toggleSound('fire',this)">🔥 Fireplace</button>
      <button class="btn" id="snd-wind" onclick="toggleSound('wind',this)">💨 Wind</button>
      <button class="btn" id="snd-thunder" onclick="toggleSound('thunder',this)">⛈ Thunder</button>
    </div>
    <div class="vol-row"><span>Vol</span><input type="range" id="soundVol" min="0" max="100" value="50"></div>
    <div class="hint" id="snd-hint"></div>

    <hr>
    <div class="sec-label">Lofi / Music (YouTube)</div>
    <div class="g2">
      <button class="btn" onclick="openYT('jfKfPfyJRdk',this)">🎵 Lofi Girl</button>
      <button class="btn" onclick="openYT('q76bMs-NwI4',this)">🌧 Rain & Jazz</button>
      <button class="btn" onclick="openYT('lTRiuFIWV54',this)">🔥 Fireplace 4K</button>
      <button class="btn" onclick="openYT('4xDzrJKXOOY',this)">🌊 Synthwave</button>
      <button class="btn" onclick="openYT('1ZYbU82GVz4',this)">❄️ Snowy Cabin</button>
      <button class="btn" onclick="openYT('mPZkdNFkNps',this)">🪟 Rain Window</button>
    </div>
    <div class="hint" id="yt-hint"></div>

    <hr>
    <button class="btn full" id="fsBtn" onclick="toggleFullscreen()">⛶ Enter Fullscreen</button>
  </div>

  <!-- TODO TAB -->
  <div class="tab-content" id="tab-todo">
    <div id="todo-input-row">
      <input type="text" id="todo-text" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTodo()">
      <button id="todo-add-btn" onclick="addTodo()">＋</button>
    </div>
    <div class="color-pills" id="todo-colors"></div>
    <div id="todo-list"></div>

<script>
// ══════════════════════════════════════════════════════
//  STATE & STORAGE
// ══════════════════════════════════════════════════════
const STORE_KEY = 'studyclock_v2';
let state = {
  todos: [],
  events: [],
  clockStyle: 'face-tactical',
  clockSize: 360,
  clockVisible: true,
  timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
  atmosphere: 'none',
  particlesOn: true,
  bgPhoto: null,
  soundVol: 50,
  calLang: 'en',
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
};

function saveState(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}
function loadState(){
  try{
    const s=localStorage.getItem(STORE_KEY);
    if(s) state=Object.assign(state,JSON.parse(s));
  }catch(e){}
}
loadState();

// ══════════════════════════════════════════════════════
//  LEFT PANEL
// ══════════════════════════════════════════════════════
let leftOpen=false;
function toggleLeftPanel(tab){
  if(leftOpen && document.querySelector('.ptab.active').dataset.tab===tab){
    closeLeftPanel(); return;
  }
  leftOpen=true;
  document.getElementById('left-panel').classList.add('open');
  if(tab) switchTab(tab);
}
function closeLeftPanel(){
  leftOpen=false;
  document.getElementById('left-panel').classList.remove('open');
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeLeftPanel(); closeBgModal(); closeGlobe(); } });
document.addEventListener('click',e=>{
  const panel=document.getElementById('left-panel');
  const peek=document.getElementById('left-peek');
  if(leftOpen && !panel.contains(e.target) && !peek.contains(e.target)) closeLeftPanel();
});

function switchTab(name){
  document.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.toggle('active',t.id==='tab-'+name));
}

// ══════════════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════════════
const hourHand=document.getElementById('hour');
const minHand=document.getElementById('min');
const secHand=document.getElementById('sec');
const marksEl=document.getElementById('marks');
const clockFace=document.getElementById('clockFace');

function buildMarks(){
  marksEl.innerHTML='';
  for(let i=1;i<=60;i++){const m=document.createElement('div');m.className='dot';m.style.setProperty('--i',i);marksEl.appendChild(m);}
}
buildMarks();

let selectedTZ=state.timezone;
function tickClock(){
  const now=new Date();
  const tzDate=new Date(now.toLocaleString('en-US',{timeZone:selectedTZ}));
  const s=tzDate.getSeconds(),m=tzDate.getMinutes(),h=tzDate.getHours();
  secHand.style.transform=`translateX(-50%) rotate(${(s/60)*360}deg)`;
  minHand.style.transform=`translateX(-50%) rotate(${(m/60)*360+(s/60)*6}deg)`;
  hourHand.style.transform=`translateX(-50%) rotate(${((h%12)/12)*360+(m/60)*30}deg)`;
  if(globeClockVisible) updateGlobeTime();
}
setInterval(tickClock,1000); tickClock();

function toggleClock(){
  state.clockVisible=!state.clockVisible;
  clockFace.classList.toggle('clock-hidden',!state.clockVisible);
  document.getElementById('ck-toggle').classList.toggle('active',state.clockVisible);
  saveState();
}

function toggleTzPopup(){
  const p=document.getElementById('tz-popup');
  p.style.display=p.style.display==='block'?'none':'block';
}
document.addEventListener('click',e=>{
  const popup=document.getElementById('tz-popup');
  const btn=document.getElementById('ck-tz');
  if(!popup.contains(e.target) && e.target!==btn) popup.style.display='none';
});

// Populate timezone list
const TZ_LIST=['Asia/Kolkata','UTC','America/New_York','America/Los_Angeles','America/Chicago','Europe/London','Europe/Paris','Europe/Berlin','Asia/Tokyo','Asia/Shanghai','Asia/Dubai','Asia/Singapore','Australia/Sydney','Pacific/Auckland','America/Sao_Paulo','Africa/Cairo'];
const tzSel=document.getElementById('tz-select');
TZ_LIST.forEach(tz=>{const o=document.createElement('option');o.value=tz;o.textContent=tz.replace('_',' ');if(tz===selectedTZ)o.selected=true;tzSel.appendChild(o);});
function setTimezone(tz){selectedTZ=tz;state.timezone=tz;saveState();tickClock();showToast('⏰ Timezone: '+tz);document.getElementById('tz-popup').style.display='none';}

// Clock size + style
document.getElementById('sizeSlider').value=state.clockSize;
document.documentElement.style.setProperty('--clock-size',state.clockSize+'px');
document.getElementById('sizeSlider').oninput=e=>{
  document.documentElement.style.setProperty('--clock-size',e.target.value+'px');
  state.clockSize=parseInt(e.target.value);
  saveState(); resizeEventCanvas();
};

clockFace.className='clock '+state.clockStyle;
document.getElementById('styleSelect').value=state.clockStyle;
document.getElementById('styleSelect').onchange=e=>{
  state.clockStyle=e.target.value;
  clockFace.className='clock '+e.target.value; buildMarks();
  const s=e.target.value;
  hourHand.style.background=s==='face-minimal'?'rgba(255,255,255,0.9)':s==='face-classic'?'#f5f5dc':'#38bdf8';
  minHand.style.background=s==='face-minimal'?'rgba(255,255,255,0.6)':s==='face-classic'?'#d4a017':'#4ade80';
  secHand.style.background=s==='face-classic'?'#e74c3c':'#fbbf24';
  saveState();
};
if(!state.clockVisible) clockFace.classList.add('clock-hidden');
if(!document.getElementById('ck-toggle').classList.contains('active')===state.clockVisible) document.getElementById('ck-toggle').classList.toggle('active',state.clockVisible);

// ══════════════════════════════════════════════════════
//  CLOCK EDGE EVENTS
// ══════════════════════════════════════════════════════
const evCanvas=document.getElementById('clock-events-canvas');
const evCtx=evCanvas.getContext('2d');

function resizeEventCanvas(){
  const sz=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--clock-size'));
  evCanvas.width=sz; evCanvas.height=sz;
  drawClockEvents();
}

function drawClockEvents(){
  const w=evCanvas.width,h=evCanvas.height,cx=w/2,cy=h/2,r=w/2-6;
  evCtx.clearRect(0,0,w,h);
  const today=new Date().toISOString().split('T')[0];
  state.events.filter(ev=>ev.date===today && ev.start && ev.end).forEach(ev=>{
    const s=timeToMinutes(ev.start),e=timeToMinutes(ev.end);
    if(s===null||e===null) return;
    const startAngle=(s/720)*Math.PI*2-Math.PI/2;
    const endAngle=(e/720)*Math.PI*2-Math.PI/2;
    evCtx.beginPath();
    evCtx.arc(cx,cy,r,startAngle,endAngle);
    evCtx.lineWidth=8;
    evCtx.strokeStyle=ev.color+'cc';
    evCtx.shadowColor=ev.color;
    evCtx.shadowBlur=6;
    evCtx.stroke();
    evCtx.shadowBlur=0;
  });
}
function timeToMinutes(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
setInterval(drawClockEvents,30000); resizeEventCanvas();

// Hover detection on clock arc
const tooltip=document.getElementById('event-tooltip');
evCanvas.parentElement.addEventListener('mousemove',e=>{
  const rect=evCanvas.parentElement.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const dx=e.clientX-cx,dy=e.clientY-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const r=rect.width/2;
  if(dist>r-20&&dist<r+20){
    const angle=Math.atan2(dy,dx)+Math.PI/2;
    const minutes=((angle<0?angle+Math.PI*2:angle)/(Math.PI*2))*720;
    const today=new Date().toISOString().split('T')[0];
    const found=state.events.find(ev=>{
      if(ev.date!==today||!ev.start||!ev.end) return false;
      const s=timeToMinutes(ev.start),en=timeToMinutes(ev.end);
      return minutes>=s&&minutes<=en;
    });
    if(found){
      tooltip.style.display='block';
      tooltip.style.left=e.clientX+12+'px';
      tooltip.style.top=e.clientY-10+'px';
      tooltip.style.borderColor=found.color;
      tooltip.innerHTML=`<b style="color:${found.color}">${found.title}</b><br><span style="color:var(--text-dim)">${found.start}–${found.end}</span>`;
      return;
    }
  }
  tooltip.style.display='none';
});
evCanvas.parentElement.addEventListener('mouseleave',()=>tooltip.style.display='none');
evCanvas.parentElement.addEventListener('click',e=>{
  const rect=evCanvas.parentElement.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const dx=e.clientX-cx,dy=e.clientY-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const r=rect.width/2;
  if(dist>r-20&&dist<r+20){
    const angle=Math.atan2(dy,dx)+Math.PI/2;
    const minutes=((angle<0?angle+Math.PI*2:angle)/(Math.PI*2))*720;
    const today=new Date().toISOString().split('T')[0];
    const found=state.events.find(ev=>{
      if(ev.date!==today||!ev.start||!ev.end) return false;
      return minutes>=timeToMinutes(ev.start)&&minutes<=timeToMinutes(ev.end);
    });
    if(found){toggleLeftPanel('calendar');}
  }
});

// ══════════════════════════════════════════════════════
//  TODO LIST
// ══════════════════════════════════════════════════════
const TODO_COLORS=['#ef4444','#f97316','#eab308','#22c55e','#38bdf8','#a78bfa','#ec4899','#fff'];
let selectedTodoColor=TODO_COLORS[4];

function buildTodoColors(){
  const el=document.getElementById('todo-colors');
  el.innerHTML='';
  TODO_COLORS.forEach(c=>{
    const p=document.createElement('div');
    p.className='cpill'+(c===selectedTodoColor?' selected':'');
    p.style.background=c; p.title=c;
    p.onclick=()=>{selectedTodoColor=c;buildTodoColors();};
    el.appendChild(p);
  });
}
buildTodoColors();

function addTodo(){
  const txt=document.getElementById('todo-text').value.trim();
  if(!txt) return;
  state.todos.unshift({id:Date.now(),text:txt,color:selectedTodoColor,done:false,created:new Date().toISOString()});
  document.getElementById('todo-text').value='';
  saveState(); renderTodos();

function renderTodos(){
  const el=document.getElementById('todo-list');
  el.innerHTML='';
  state.todos.forEach(todo=>{
    const div=document.createElement('div');
    div.className='todo-item';
    div.style.background=todo.color+'18';
    div.style.borderColor=todo.color;

    div.innerHTML=`
      <div class="todo-check${todo.done?' done':''}" onclick="toggleTodo(${todo.id})"></div>
      <div style="flex:1">
        <div class="todo-text-el${todo.done?' done':''}">${escHtml(todo.text)}</div>
        <div class="todo-date">${date}</div>
      </div>
      <button class="todo-del" onclick="deleteTodo(${todo.id})">✕</button>

function toggleTodo(id){state.todos.find(t=>t.id===id).done^=1;saveState();renderTodos();}
function deleteTodo(id){state.todos=state.todos.filter(t=>t.id!==id);saveState();renderTodos();}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
renderTodos();

// ══════════════════════════════════════════════════════
//  CALENDAR
// ══════════════════════════════════════════════════════
const BN_MONTHS=['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
const EN_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const BN_DAYS=['র','স','ম','ব','ব','শ','শ'];
const EN_DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];

// Bengali date conversion (Bangla calendar / Bangabda)
function toBengaliDate(jsDate){
  const BN_CAL_MONTHS=[{name:'বৈশাখ',days:31},{name:'জ্যৈষ্ঠ',days:31},{name:'আষাঢ়',days:31},{name:'শ্রাবণ',days:31},{name:'ভাদ্র',days:31},{name:'আশ্বিন',days:30},{name:'কার্তিক',days:30},{name:'অগ্রহায়ণ',days:30},{name:'পৌষ',days:30},{name:'মাঘ',days:30},{name:'ফাল্গুন',days:30},{name:'চৈত্র',days:30}];
  const y=jsDate.getFullYear(),m=jsDate.getMonth()+1,d=jsDate.getDate();
  let bnYear=y-593,bnMonth=0,bnDay=0;
  if(m<4||(m===4&&d<14)){bnYear--;}
  const enMonth=[0,31,28+(y%4===0&&(y%100!==0||y%400===0)?1:0),31,30,31,30,31,31,30,31,30,31];
  let dayOfYear=d;for(let i=1;i<m;i++)dayOfYear+=enMonth[i];
  const startDay=dayOfYear>=105?dayOfYear-104:dayOfYear+(365+(y%4===0&&(y%100!==0||y%400===0)?1:0))-104;
  let rem=startDay;
  for(let i=0;i<12;i++){if(rem<=BN_CAL_MONTHS[i].days){bnMonth=i;bnDay=rem;break;}rem-=BN_CAL_MONTHS[i].days;}
  const bnDigits='০১২৩৪৫৬৭৮৯';
  const tobn=n=>String(n).split('').map(c=>bnDigits[parseInt(c)]).join('');
  return tobn(bnDay)+' '+BN_CAL_MONTHS[bnMonth].name;
}

function renderCalendar(){
  const {calYear:y,calMonth:m,calLang:lang}=state;
  const title=document.getElementById('cal-title');
  title.textContent=(lang==='bn'?BN_MONTHS[m]:EN_MONTHS[m])+' '+(lang==='bn'?toBnNum(y):y);
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  const days=lang==='bn'?BN_DAYS:EN_DAYS;
  days.forEach(d=>{const el=document.createElement('div');el.className='cal-day-hdr';el.textContent=d;grid.appendChild(el);});
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const today=new Date();
  for(let i=firstDay-1;i>=0;i--){
    const el=document.createElement('div');
    el.className='cal-day other-month';
    el.innerHTML=`<span>${prevDays-i}</span>`;
    grid.appendChild(el);
  }
  for(let d=1;d<=daysInMonth;d++){
    const el=document.createElement('div');
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const hasEv=state.events.some(ev=>ev.date===dateStr);
    el.className='cal-day'+(isToday?' today':'')+(hasEv?' has-event':'');
    const dispNum=lang==='bn'?toBnNum(d):d;
    let inner=`<span>${dispNum}</span>`;
    if(lang==='bn'){inner+=`<span class="bengali-date">${toBengaliDate(new Date(y,m,d)).split(' ')[0]}</span>`;}
    el.innerHTML=inner;
    el.onclick=()=>{
      document.getElementById('ev-date').value=dateStr;
      showToast('📅 Date selected: '+dateStr);
    };
    grid.appendChild(el);
  }
  const total=firstDay+daysInMonth,rem=total%7===0?0:7-total%7;
  for(let d=1;d<=rem;d++){
    const el=document.createElement('div');el.className='cal-day other-month';el.innerHTML=`<span>${d}</span>`;grid.appendChild(el);
  }
  renderEventsList();
}

function toBnNum(n){const d='০১২৩৪৫৬৭৮৯';return String(n).split('').map(c=>isNaN(c)?c:d[parseInt(c)]).join('');}
function calPrev(){state.calMonth--;if(state.calMonth<0){state.calMonth=11;state.calYear--;}saveState();renderCalendar();}
function calNext(){state.calMonth++;if(state.calMonth>11){state.calMonth=0;state.calYear++;}saveState();renderCalendar();}
function setCalLang(l){state.calLang=l;saveState();renderCalendar();document.getElementById('cal-eng-btn').classList.toggle('active',l==='en');document.getElementById('cal-ben-btn').classList.toggle('active',l==='bn');}
if(state.calLang==='bn'){document.getElementById('cal-ben-btn').classList.add('active');document.getElementById('cal-eng-btn').classList.remove('active');}
state.calYear=state.calYear||new Date().getFullYear();
state.calMonth=state.calMonth!==undefined?state.calMonth:new Date().getMonth();
renderCalendar();

// ── Events ──
const EV_COLORS=['#ef4444','#f97316','#eab308','#22c55e','#38bdf8','#a78bfa','#ec4899'];
let selectedEvColor=EV_COLORS[4];
function buildEvColors(){
  const el=document.getElementById('ev-colors');
  el.innerHTML='';
  EV_COLORS.forEach(c=>{
    const p=document.createElement('div');
    p.className='ev-col'+(c===selectedEvColor?' selected':'');
    p.style.background=c;
    p.onclick=()=>{selectedEvColor=c;buildEvColors();};
    el.appendChild(p);
  });
}
buildEvColors();
document.getElementById('ev-date').valueAsDate=new Date();

function saveEvent(){
  const title=document.getElementById('ev-title').value.trim();
  if(!title){showToast('⚠ Please enter event title');return;}
  const ev={id:Date.now(),title,start:document.getElementById('ev-start').value,end:document.getElementById('ev-end').value,date:document.getElementById('ev-date').value||new Date().toISOString().split('T')[0],color:selectedEvColor};
  state.events.unshift(ev);
  saveState(); renderCalendar(); renderEventsList(); drawClockEvents();
  document.getElementById('ev-title').value='';
  showToast('✅ Event saved!');
}

function renderEventsList(){
  const el=document.getElementById('events-list');
  el.innerHTML='';
  const {calYear:y,calMonth:m}=state;
  const monthStr=`${y}-${String(m+1).padStart(2,'0')}`;

  if(!filtered.length){el.innerHTML='<div style="font-size:11px;color:var(--text-dim);text-align:center;padding:8px;">No events this month</div>';return;}
  filtered.forEach(ev=>{
    const div=document.createElement('div');
    div.className='event-item';
    div.style.background=ev.color+'18';
    div.style.borderColor=ev.color;
    div.innerHTML=`<span><b>${escHtml(ev.title)}</b><br><span style="color:var(--text-dim);font-size:10px;">${ev.date} ${ev.start||''}${ev.end?'–'+ev.end:''}</span></span><button class="event-item-del" onclick="deleteEvent(${ev.id})">✕</button>`;
    el.appendChild(div);
  });
}

function deleteEvent(id){state.events=state.events.filter(e=>e.id!==id);saveState();renderCalendar();drawClockEvents();}

// ══════════════════════════════════════════════════════
//  GLOBE / EARTH DAY-NIGHT
// ══════════════════════════════════════════════════════
let globeAnimId=null,globeActive=false,globeClockVisible=false;
const gc=document.getElementById('globe-canvas');
const gctx=gc.getContext('2d');

function toggleGlobe(){
  globeActive=!globeActive;
  document.getElementById('globe-overlay').style.display=globeActive?'flex':'none';
  document.getElementById('globe-btn').classList.toggle('active',globeActive);
  if(globeActive){gc.width=window.innerWidth;gc.height=window.innerHeight;startGlobe();}
  else{if(globeAnimId)cancelAnimationFrame(globeAnimId);globeAnimId=null;}
}

function toggleGlobeClock(){

  document.getElementById('globe-clock-toggle').classList.toggle('active',globeClockVisible);

function updateGlobeTime(){
  const now=new Date();
  const tzDate=new Date(now.toLocaleString('en-US',{timeZone:selectedTZ}));
  const h=String(tzDate.getHours()).padStart(2,'0');
  const m=String(tzDate.getMinutes()).padStart(2,'0');
  const s=String(tzDate.getSeconds()).padStart(2,'0');
  document.getElementById('globe-time-text').textContent=`${h}:${m}:${s}`;
  document.getElementById('globe-date-sub').textContent=tzDate.toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

function getSunPosition(date){
  const d=date.getTime()/86400000-10957.5;
  const g=(357.529+0.98560028*d)*Math.PI/180;
  const q=280.459+0.98564736*d;
  const L=(q+1.915*Math.sin(g)+0.020*Math.sin(2*g))*Math.PI/180;
  const e=23.439*Math.PI/180;
  const sinDec=Math.sin(e)*Math.sin(L);
  const dec=Math.asin(sinDec);
  const RA=Math.atan2(Math.cos(e)*Math.sin(L),Math.cos(L));
  const GMST=6.697375+0.0657098242*d+(date.getUTCHours()+date.getUTCMinutes()/60+date.getUTCSeconds()/3600);
  const sunLon=((RA*180/Math.PI-GMST*15)%360+360)%360-180;
  return {lat:dec*180/Math.PI,lon:sunLon};
}

function startGlobe(){
  function frame(){
    globeAnimId=requestAnimationFrame(frame);
    drawGlobe();
  }
  frame();
}

function drawGlobe(){
  const W=gc.width,H=gc.height;
  gctx.clearRect(0,0,W,H);

  // Dark space background
  gctx.fillStyle='#02020e';
  gctx.fillRect(0,0,W,H);

  // Stars
  if(!window._globeStars){
    window._globeStars=[];
    for(let i=0;i<300;i++) window._globeStars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.2+0.2,a:Math.random()*0.6+0.3});
  }
  window._globeStars.forEach(s=>{
    gctx.beginPath();gctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    gctx.fillStyle=`rgba(255,255,255,${s.a})`;gctx.fill();
  });

  const now=new Date();
  const sun=getSunPosition(now);
  const utcH=now.getUTCHours()+now.getUTCMinutes()/60+now.getUTCSeconds()/3600;
  const subSolarLon=((utcH-12)/24)*360;

  // Draw Equirectangular projection
  const mapW=W,mapH=H;

  // Ocean base
  const oceanGrad=gctx.createLinearGradient(0,0,0,mapH);
  oceanGrad.addColorStop(0,'#0a1628');
  oceanGrad.addColorStop(0.5,'#0d2040');
  oceanGrad.addColorStop(1,'#0a1628');
  gctx.fillStyle=oceanGrad;
  gctx.fillRect(0,0,mapW,mapH);

  // Draw continents (simplified SVG-like paths scaled to canvas)
  drawContinents(gctx,W,H);

  // Day/Night shadow overlay
  for(let x=0;x<W;x+=2){
    const lon=((x/W)*360)-180;
    for(let y=0;y<H;y+=2){
      const lat=90-((y/H)*180);
      const cosZ=Math.sin(sun.lat*Math.PI/180)*Math.sin(lat*Math.PI/180)+
                 Math.cos(sun.lat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.cos((lon-subSolarLon)*Math.PI/180);
      if(cosZ<0.05){
        const alpha=Math.min(1,Math.max(0,(0.05-cosZ)/0.15));
        gctx.fillStyle=`rgba(0,0,15,${alpha*0.82})`;
        gctx.fillRect(x,y,2,2);
      }
    }
  }

  // Night city lights (only in dark regions)
  drawNightLights(gctx,W,H,sun,subSolarLon);

  // Overlay: latitude lines
  gctx.strokeStyle='rgba(255,255,255,0.04)';
  gctx.lineWidth=1;
  for(let lat=-60;lat<=60;lat+=30){
    const y=(90-lat)/180*H;
    gctx.beginPath();gctx.moveTo(0,y);gctx.lineTo(W,y);gctx.stroke();
  }
  // Equator highlight
  gctx.strokeStyle='rgba(56,189,248,0.12)';
  gctx.lineWidth=1.5;
  const eqY=H/2;
  gctx.beginPath();gctx.moveTo(0,eqY);gctx.lineTo(W,eqY);gctx.stroke();

  // Longitude lines
  gctx.strokeStyle='rgba(255,255,255,0.04)';
  gctx.lineWidth=1;
  for(let lon=-150;lon<=180;lon+=30){
    const x=(lon+180)/360*W;
    gctx.beginPath();gctx.moveTo(x,0);gctx.lineTo(x,H);gctx.stroke();
  }

  // Location pin (Siliguri, West Bengal)
  const userLat=26.72,userLon=88.39;
  const px=(userLon+180)/360*W,py=(90-userLat)/180*H;
  gctx.beginPath();gctx.arc(px,py,5,0,Math.PI*2);
  gctx.fillStyle='#fff';gctx.fill();
  gctx.beginPath();gctx.arc(px,py,10,0,Math.PI*2);
  gctx.strokeStyle='rgba(255,255,255,0.4)';gctx.lineWidth=1.5;gctx.stroke();
  gctx.fillStyle='rgba(255,255,255,0.85)';
  gctx.font='bold 11px Space Grotesk,sans-serif';
  gctx.fillText('📍 Siliguri',px+12,py+4);

  // Terminator line label
  const termX=((subSolarLon+180)%360)/360*W;
  gctx.fillStyle='rgba(255,200,50,0.4)';
  gctx.font='10px JetBrains Mono,monospace';
}

function grad(c,x0,y0,x1,y1,stops){const g=c.createLinearGradient(x0,y0,x1,y1);stops.forEach(([t,col])=>g.addColorStop(t,col));return g;}
function rgrad(c,cx,cy,r0,r1,stops){const g=c.createRadialGradient(cx,cy,r0,cx,cy,r1);stops.forEach(([t,col])=>g.addColorStop(t,col));return g;}

function bokeh(c,x,y,r,hex,a){const rr=parseInt(hex.slice(1,3),16),gg=parseInt(hex.slice(3,5),16),bb=parseInt(hex.slice(5,7),16);const g=c.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,`rgba(${rr},${gg},${bb},${a*3.5})`);g.addColorStop(1,`rgba(${rr},${gg},${bb},0)`);c.fillStyle=g;c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();}

function renderStaticBg(c,atm){
  const w=c.canvas.width,h=c.canvas.height;
  switch(atm){
    case 'none':c.fillStyle='#050508';c.fillRect(0,0,w,h);break;
    case 'rain-window':{c.fillStyle=grad(c,0,0,0,h,[[0,'#050a14'],[.5,'#0c1520'],[1,'#080d18']]);c.fillRect(0,0,w,h);[[w*.12,h*.62,150,'#f59e0b',.055],[w*.38,h*.72,110,'#3b82f6',.045],[w*.58,h*.58,130,'#ef4444',.045],[w*.8,h*.67,100,'#a78bfa',.04],[w*.28,h*.82,80,'#fbbf24',.035],[w*.7,h*.78,70,'#34d399',.03],[w*.92,h*.5,90,'#f472b6',.03],[w*.05,h*.45,60,'#60a5fa',.025]].forEach(([bx,by,br,col,ba])=>bokeh(c,bx,by,br,col,ba));c.fillStyle='rgba(120,160,210,0.025)';c.fillRect(0,0,w,h);break;}
    case 'rain-night':{c.fillStyle=grad(c,0,0,0,h,[[0,'#03060e'],[.55,'#0a1525'],[1,'#120808']]);c.fillRect(0,0,w,h);drawCityline(c,w,h);break;}
    case 'rain-forest':{c.fillStyle=grad(c,0,0,0,h,[[0,'#020802'],[.4,'#071407'],[1,'#030a03']]);c.fillRect(0,0,w,h);drawTrees(c,w,h,'rgba(4,12,4,0.95)',h*.72);break;}
    case 'rain-heavy':{c.fillStyle=grad(c,0,0,0,h,[[0,'#020408'],[1,'#080e1a']]);c.fillRect(0,0,w,h);break;}
    case 'snow-cabin':{c.fillStyle=grad(c,0,0,0,h,[[0,'#07101e'],[.5,'#0f1e35'],[1,'#06090f']]);c.fillRect(0,0,w,h);drawStarsC(c,w,h,160);const moon=rgrad(c,w*.75,h*.15,0,90,[[0,'rgba(230,240,255,.18)'],[1,'rgba(200,220,255,0)']]);c.fillStyle=moon;c.fillRect(0,0,w,h);drawSnowGround(c,w,h);drawCabin(c,w,h);break;}
    case 'snow-blizzard':{c.fillStyle=grad(c,0,0,0,h,[[0,'#080c16'],[1,'#121a28']]);c.fillRect(0,0,w,h);break;}
    case 'night-mountain':{c.fillStyle=grad(c,0,0,0,h,[[0,'#010205'],[.3,'#06102a'],[.65,'#120b35'],[1,'#030305']]);c.fillRect(0,0,w,h);const mw=c.createLinearGradient(w*.05,0,w*.9,h*.55);mw.addColorStop(0,'rgba(80,50,160,0)');mw.addColorStop(.5,'rgba(100,70,200,.07)');mw.addColorStop(1,'rgba(60,40,140,0)');c.fillStyle=mw;c.fillRect(0,0,w,h);drawStarsC(c,w,h,220);drawMountains(c,w,h);break;}
    case 'deep-space':{c.fillStyle='#010106';c.fillRect(0,0,w,h);[[w*.22,h*.32,w*.4,'#5b21b6',.07],[w*.62,h*.22,w*.32,'#0e7490',.07],[w*.5,h*.62,w*.28,'#9d174d',.06],[w*.8,h*.5,w*.22,'#1d4ed8',.05]].forEach(([cx,cy,r,col,a])=>nebulaCloud(c,cx,cy,r,col,a));drawStarsC(c,w,h,260);break;}
    case 'aurora':{c.fillStyle=grad(c,0,0,0,h,[[0,'#010204'],[.5,'#011410'],[1,'#02030e']]);c.fillRect(0,0,w,h);drawStarsC(c,w,h,130);[{y:h*.28,col:'rgba(0,255,140,.10)',w:h*.35},{y:h*.38,col:'rgba(0,200,255,.08)',w:h*.22},{y:h*.20,col:'rgba(140,0,255,.06)',w:h*.45},{y:h*.50,col:'rgba(0,255,100,.05)',w:h*.18}].forEach(b=>{const ag=c.createLinearGradient(0,b.y-b.w/2,0,b.y+b.w/2);ag.addColorStop(0,'rgba(0,0,0,0)');ag.addColorStop(.5,b.col);ag.addColorStop(1,'rgba(0,0,0,0)');c.fillStyle=ag;c.fillRect(0,b.y-b.w/2,w,b.w);});break;}
    case 'sunset':{c.fillStyle=grad(c,0,0,0,h,[[0,'#06000f'],[.28,'#5a0c18'],[.5,'#c44220'],[.68,'#e87b30'],[.82,'#f2b455'],[1,'#100500']]);c.fillRect(0,0,w,h);const sx=w*.5,sy=h*.54;[120,.15,60,.3,20,.55].forEach(([r,a])=>{const sg=rgrad(c,sx,sy,0,r,[[0,`rgba(255,240,160,${a})`],[1,'rgba(255,180,40,0)']]);c.fillStyle=sg;c.beginPath();c.arc(sx,sy,r,0,Math.PI*2);c.fill();});drawTrees(c,w,h,'rgba(4,2,0,.97)',h*.7);break;}
    case 'fireplace':{c.fillStyle=rgrad(c,w/2,h,0,h,[[0,'#2e1000'],[.35,'#140600'],[1,'#030100']]);c.fillRect(0,0,w,h);const fg=rgrad(c,w/2,h*.85,0,h*.6,[[0,'rgba(255,100,5,.22)'],[.5,'rgba(200,50,5,.09)'],[1,'rgba(0,0,0,0)']]);c.fillStyle=fg;c.fillRect(0,0,w,h);c.fillStyle='rgba(8,4,1,.97)';c.fillRect(0,0,w*.25,h);c.fillRect(w*.75,0,w*.25,h);c.beginPath();c.arc(w/2,h*.5,w*.25,Math.PI,0);c.lineTo(w*.75,h);c.lineTo(w*.25,h);c.closePath();c.fill();c.fillRect(w*.22,h*.48,w*.56,h*.06);break;}
    case 'cafe':{c.fillStyle=grad(c,0,0,0,h,[[0,'#0b0703'],[.5,'#160e05'],[1,'#080502']]);c.fillRect(0,0,w,h);const fx=w*.12,fy=h*.1,fw=w*.55,fh=h*.65;c.fillStyle='rgba(40,22,8,.95)';c.fillRect(fx-10,fy-10,fw+20,fh+20);c.fillStyle='rgba(180,210,255,.04)';c.fillRect(fx,fy,fw,fh);bokeh(c,fx+fw*.25,fy+fh*.4,80,'#f59e0b',.07);bokeh(c,fx+fw*.55,fy+fh*.6,60,'#3b82f6',.05);bokeh(c,fx+fw*.7,fy+fh*.3,50,'#fbbf24',.05);c.strokeStyle='rgba(40,22,8,1)';c.lineWidth=8;c.beginPath();c.moveTo(fx,fy+fh*.45);c.lineTo(fx+fw,fy+fh*.45);c.stroke();c.beginPath();c.moveTo(fx+fw*.48,fy);c.lineTo(fx+fw*.48,fy+fh);c.stroke();break;}
  }
}

let flameT=0,auroraT=0,flickerT=0,flashAlpha=0;
function drawFlames(){if(currentAtm!=='fireplace')return;flameT+=.04;const fx=W/2,fy=H*.82,fw=W*.22;for(let i=0;i<3;i++){const off=(i-.5)*fw*.5,fh2=H*(.18+Math.sin(flameT+i*.8)*.04);const flm=ctx.createRadialGradient(fx+off,fy,0,fx+off,fy-fh2*.7,fh2);flm.addColorStop(0,'rgba(255,240,80,.35)');flm.addColorStop(.3,'rgba(255,140,10,.22)');flm.addColorStop(.7,'rgba(200,50,5,.10)');flm.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=flm;ctx.beginPath();ctx.ellipse(fx+off,fy-fh2*.3,fw*.18+Math.sin(flameT+i)*8,fh2*.55,0,0,Math.PI*2);ctx.fill();}}
function triggerLightning(){if(currentAtm==='rain-heavy'&&Math.random()<.003)flashAlpha=.20;}
function drawFlash(){if(flashAlpha>.005){ctx.fillStyle=`rgba(210,230,255,${flashAlpha})`;ctx.fillRect(0,0,W,H);flashAlpha*=.65;}}
function drawAuroraShimmer(){if(currentAtm!=='aurora')return;auroraT+=.006;const bands=[{y:H*.28,col:'rgba(0,255,140',w:H*.32,phase:0},{y:H*.38,col:'rgba(0,200,255',w:H*.20,phase:1.2},{y:H*.20,col:'rgba(130,0,255',w:H*.42,phase:2.4}];bands.forEach(b=>{const a=.07+Math.sin(auroraT+b.phase)*.035;const ag=ctx.createLinearGradient(0,b.y-b.w/2,0,b.y+b.w/2);ag.addColorStop(0,'rgba(0,0,0,0)');ag.addColorStop(.5,`${b.col},${a})`);ag.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=ag;ctx.fillRect(0,b.y-b.w/2,W,b.w);});}
function drawFireFlicker(){if(currentAtm!=='fireplace')return;flickerT+=.07;const flick=.05+Math.abs(Math.sin(flickerT))*.08;const fg=ctx.createRadialGradient(W/2,H,0,W/2,H*.6,H*.5);fg.addColorStop(0,`rgba(255,100,5,${flick})`);fg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=fg;ctx.fillRect(0,0,W,H);}

function makeRainDrop(atm){const heavy=atm==='rain-heavy';return{t:'rain',x:Math.random()*W,y:Math.random()*H,spd:heavy?22+Math.random()*12:11+Math.random()*8,len:heavy?35+Math.random()*25:16+Math.random()*16,ang:heavy?.25:.12,al:heavy?.28+Math.random()*.18:.18+Math.random()*.18,lw:heavy?1.5:.8};}
function makeWindowDrop(){return{t:'windrop',x:Math.random()*W,y:-10-Math.random()*40,spd:1.6+Math.random()*2.8,al:.45+Math.random()*.4,r:2.5+Math.random()*5.5,trail:[],wobble:Math.random()*Math.PI*2,wSpd:.03+Math.random()*.05,stopped:false,stopTimer:0};}
function makeSnow(atm){const bliz=atm==='snow-blizzard';return{t:'snow',x:Math.random()*W,y:Math.random()*H,spd:bliz?4+Math.random()*6:.7+Math.random()*1.6,drift:bliz?(Math.random()-.5)*6:(Math.random()-.5)*.9,r:bliz?1+Math.random()*3:1.5+Math.random()*4,al:.5+Math.random()*.5,sw:Math.random()*Math.PI*2,swSpd:.01+Math.random()*.025};}
function makeEmber(){const ang=-Math.PI/2+(Math.random()-.5)*1.3;return{t:'ember',x:W/2+(Math.random()-.5)*100,y:H*.87,vx:Math.cos(ang)*(1.2+Math.random()*2.2),vy:Math.sin(ang)*(2+Math.random()*3.5),life:1,dec:.005+Math.random()*.013,r:1+Math.random()*2.8,col:Math.random()<.55?'255,120,10':'255,60,5'};}

function initAtm(atm){particles=[];if(!particlesOn)return;if(atm==='rain-window'){for(let i=0;i<80;i++)particles.push(makeWindowDrop());}else if(atm.startsWith('rain')){const n=atm==='rain-heavy'?220:100;for(let i=0;i<n;i++)particles.push(makeRainDrop(atm));}if(atm.startsWith('snow')){const n=atm==='snow-blizzard'?220:70;for(let i=0;i<n;i++)particles.push(makeSnow(atm));}if(atm==='fireplace'){for(let i=0;i<70;i++)particles.push(makeEmber());}staticCache=buildStaticBg(currentAtm);}

function stepParticles(){
  particles.forEach(p=>{
    if(p.t==='rain'){p.x+=Math.sin(p.ang)*p.spd*.5;p.y+=p.spd;if(p.y>H){p.y=-20;p.x=Math.random()*W;}ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-Math.sin(p.ang)*p.len,p.y-p.len);ctx.strokeStyle=`rgba(180,210,255,${p.al})`;ctx.lineWidth=p.lw;ctx.stroke();}
    else if(p.t==='windrop'){p.wobble+=p.wSpd;if(!p.stopped){p.trail.push({x:p.x,y:p.y});if(p.trail.length>22)p.trail.shift();p.x+=Math.sin(p.wobble)*.9;p.y+=p.spd;if(Math.random()<.0015){p.stopped=true;p.stopTimer=40+Math.floor(Math.random()*80);}}else{p.stopTimer--;if(p.stopTimer<=0)p.stopped=false;}if(p.trail.length>2){ctx.beginPath();ctx.moveTo(p.trail[0].x,p.trail[0].y);for(let i=1;i<p.trail.length;i++)ctx.lineTo(p.trail[i].x,p.trail[i].y);ctx.strokeStyle=`rgba(140,185,240,${p.al*.38})`;ctx.lineWidth=p.r*.65;ctx.stroke();}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(170,210,255,${p.al*.75})`;ctx.fill();ctx.beginPath();ctx.arc(p.x-p.r*.3,p.y-p.r*.3,p.r*.35,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p.al*.55})`;ctx.fill();if(p.y>H+30)Object.assign(p,makeWindowDrop());}
    else if(p.t==='snow'){p.sw+=p.swSpd;p.x+=p.drift+Math.sin(p.sw)*.6;p.y+=p.spd;if(p.y>H+10||p.x<-20||p.x>W+20){p.x=Math.random()*W;p.y=-10;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(220,235,255,${p.al})`;ctx.fill();}
    else if(p.t==='ember'){p.x+=p.vx;p.y+=p.vy;p.vy-=.05;p.vx*=.985;p.life-=p.dec;if(p.life<=0){Object.assign(p,makeEmber());return;}ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fillStyle=`rgba(${p.col},${p.life*.9})`;ctx.fill();}
  });
}

function animate(){animId=requestAnimationFrame(animate);frameCount++;if(staticCache)ctx.drawImage(staticCache,0,0);else{ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);}drawAuroraShimmer();drawFireFlicker();drawFlames();if(particlesOn)stepParticles();drawFlash();triggerLightning();}
function initAtmosphere(atm){currentAtm=atm;state.atmosphere=atm;saveState();staticCache=null;staticCache=buildStaticBg(atm);initAtm(atm);}

resize(); cancelAnimationFrame(animId); animate();

document.getElementById('atmSelect').value=state.atmosphere;
document.getElementById('atmSelect').onchange=e=>initAtmosphere(e.target.value);

function toggleParticles(btn){particlesOn=!particlesOn;state.particlesOn=particlesOn;saveState();btn.textContent=particlesOn?'🌨 Particles On':'🌫 Particles Off';btn.classList.toggle('active',particlesOn);if(particlesOn)initAtm(currentAtm);else particles=[];}
if(!state.particlesOn){document.getElementById('btn-particles').textContent='🌫 Particles Off';document.getElementById('btn-particles').classList.remove('active');}

// ══════════════════════════════════════════════════════
//  SOUND (Web Audio — works offline)
// ══════════════════════════════════════════════════════
let AC=null,soundNodes={},activeSound=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function mkNoise(ac,sec=3){const b=ac.createBuffer(1,ac.sampleRate*sec,ac.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;return b;}
function vol(){return document.getElementById('soundVol').value/100;}
const SOUNDS={
  rain:{v:.65,label:'🌧 Rain sound playing',make(ac,g){const s=ac.createBufferSource();s.buffer=mkNoise(ac,4);s.loop=true;const bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=700;bp.Q.value=.6;const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2200;s.connect(bp);bp.connect(lp);lp.connect(g);s.start();return[s];}},
  fire:{v:.5,label:'🔥 Fireplace crackling',make(ac,g){return[[70,1.2,.55],[175,.8,.3],[420,.4,.18]].map(([f,q,gv])=>{const s=ac.createBufferSource();s.buffer=mkNoise(ac,3);s.loop=true;const bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=f;bp.Q.value=q;const gn=ac.createGain();gn.gain.value=gv;s.connect(bp);bp.connect(gn);gn.connect(g);s.start();return s;});}},
  wind:{v:.45,label:'💨 Wind howling',make(ac,g){const s=ac.createBufferSource();s.buffer=mkNoise(ac,5);s.loop=true;const hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=180;const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=750;s.connect(hp);hp.connect(lp);lp.connect(g);s.start();return[s];}},
  thunder:{v:.55,label:'⛈ Thunder & storm',make(ac,g){return[[55,.9,.65],[110,.55,.32],[280,.3,.16]].map(([f,q,gv])=>{const s=ac.createBufferSource();s.buffer=mkNoise(ac,4);s.loop=true;const bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=f;bp.Q.value=q;const gn=ac.createGain();gn.gain.value=gv;s.connect(bp);bp.connect(gn);gn.connect(g);s.start();return s;});}},
};
function toggleSound(key,btn){
  const allBtns=['rain','fire','wind','thunder'].map(k=>document.getElementById('snd-'+k));
  const hint=document.getElementById('snd-hint');
  if(activeSound===key){stopSnd();allBtns.forEach(b=>b.classList.remove('active'));hint.textContent='';return;}
  stopSnd();allBtns.forEach(b=>b.classList.remove('active'));
  const ac=getAC();if(ac.state==='suspended')ac.resume();
  const master=ac.createGain();master.gain.value=vol()*SOUNDS[key].v;master.connect(ac.destination);
  const srcs=SOUNDS[key].make(ac,master);
  soundNodes={master,srcs,key};activeSound=key;btn.classList.add('active');hint.textContent=SOUNDS[key].label;
}
function stopSnd(){if(soundNodes.srcs)soundNodes.srcs.forEach(s=>{try{s.stop();}catch(e){}});soundNodes={};activeSound=null;}
document.getElementById('soundVol').value=state.soundVol;
document.getElementById('soundVol').oninput=e=>{state.soundVol=parseInt(e.target.value);saveState();if(soundNodes.master)soundNodes.master.gain.value=vol()*(SOUNDS[activeSound]?.v||.5);};

// ══════════════════════════════════════════════════════
//  YOUTUBE
// ══════════════════════════════════════════════════════
let activeYT=null;
function openYT(id,btn){
  const hint=document.getElementById('yt-hint');
  if(activeYT===id){activeYT=null;btn.classList.remove('active');hint.textContent='';return;}
  document.querySelectorAll('#tab-settings .btn').forEach(b=>{if(b._ytId)b.classList.remove('active');});
  btn._ytId=id;btn.classList.add('active');activeYT=id;
  hint.textContent='▶ Opening in new tab…';
  window.open('https://www.youtube.com/watch?v='+id,'_blank');
  setTimeout(()=>hint.textContent='♪ Playing in separate tab',1400);
}

// ══════════════════════════════════════════════════════
//  FULLSCREEN & UTILS
// ══════════════════════════════════════════════════════
function toggleFullscreen(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
document.addEventListener('fullscreenchange',()=>{
  const b=document.getElementById('fsBtn');
  if(document.fullscreenElement){b.textContent='✕ Exit Fullscreen';b.classList.add('active');}
  else{b.textContent='⛶ Enter Fullscreen';b.classList.remove('active');}
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── Apply saved clock visibility ──
if(!state.clockVisible){clockFace.classList.add('clock-hidden');document.getElementById('ck-toggle').classList.remove('active');}

// ── Resize handler for globe ──
window.addEventListener('resize',()=>{if(globeActive){gc.width=window.innerWidth;gc.height=window.innerHeight;}resizeEventCanvas();});
</script>
