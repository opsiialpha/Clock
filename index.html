<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Study Clock Station</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap");

:root {
    --clock-size: 350px;
    --panel-bg: rgba(14,14,22,0.78);
    --accent: #4ade80;
    --border: rgba(255,255,255,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body {
    height:100vh; display:flex; align-items:center; justify-content:center;
    background:#050508; overflow:hidden; color:#fff; position:relative;
}

#atm-canvas { position:absolute; inset:0; width:100%; height:100%; z-index:0; }
#bg-overlay  { position:absolute; inset:0; background:rgba(0,0,0,0.22); z-index:1; pointer-events:none; }

/* ── CLOCK ── */
.clock-container {
    position:relative; z-index:2;
    width:var(--clock-size); height:var(--clock-size);
    display:flex; align-items:center; justify-content:center;
}
.clock {
    position:relative; width:100%; height:100%; border-radius:50%;
    background:rgba(0,0,0,0.22); backdrop-filter:blur(8px);
    border:2px solid var(--border);
}

.face-tactical .dot { position:absolute; inset:10px; transform:rotate(calc(var(--i)*6deg)); }
.face-tactical .dot::before { content:""; position:absolute; top:0; left:50%; width:2px; height:8px; background:rgba(255,255,255,0.3); transform:translateX(-50%); }
.face-tactical .dot:nth-child(5n)::before { height:15px; background:#fff; width:3px; }
.face-tactical label { position:absolute; inset:40px; text-align:center; transform:rotate(calc(var(--i)*30deg)); }
.face-tactical label span { display:inline-block; font-size:2.5rem; font-weight:700; transform:rotate(calc(var(--i)*-30deg)); }

.face-minimal .dot { position:absolute; inset:10px; transform:rotate(calc(var(--i)*6deg)); }
.face-minimal .dot::before { content:""; position:absolute; top:0; left:50%; width:1px; height:6px; background:rgba(255,255,255,0.4); transform:translateX(-50%); }
.face-minimal .dot:nth-child(5n)::before { height:12px; background:rgba(255,255,255,0.9); width:2px; }
.face-minimal label { position:absolute; inset:40px; text-align:center; transform:rotate(calc(var(--i)*30deg)); }
.face-minimal label span { display:inline-block; font-size:2rem; font-weight:300; color:rgba(255,255,255,0.85); transform:rotate(calc(var(--i)*-30deg)); }

.face-classic .dot { position:absolute; inset:10px; transform:rotate(calc(var(--i)*6deg)); }
.face-classic .dot::before { content:""; position:absolute; top:0; left:50%; width:2px; height:8px; background:rgba(255,255,255,0.25); transform:translateX(-50%); }
.face-classic .dot:nth-child(5n)::before { height:16px; background:#fff; width:3px; }
.face-classic label { position:absolute; inset:40px; text-align:center; transform:rotate(calc(var(--i)*30deg)); }
.face-classic label span { display:inline-block; font-size:2.5rem; font-weight:700; color:#f5f5dc; transform:rotate(calc(var(--i)*-30deg)); }

.hand { position:absolute; bottom:50%; left:50%; transform-origin:bottom center; border-radius:10px; transform:translateX(-50%) rotate(0deg); }
.hour-hand { width:10px; height:25%; background:#3b82f6; z-index:3; }
.min-hand  { width:8px;  height:35%; background:#4ade80; z-index:2; }
.sec-hand  { width:2px;  height:40%; background:#fbbf24; z-index:4; }
.center-dot { position:absolute; width:15px; height:15px; background:#fff; border-radius:50%; z-index:10; border:2px solid #000; top:50%; left:50%; transform:translate(-50%,-50%); }

/* ── PANEL ── */
.side-panel {
    position:absolute; right:18px; top:50%; transform:translateY(-50%);
    width:284px; background:var(--panel-bg); backdrop-filter:blur(22px);
    padding:16px; border-radius:20px; z-index:10;
    border:1px solid var(--border);
    max-height:96vh; overflow-y:auto;
    scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.12) transparent;
}

.sec { font-size:10px; text-transform:uppercase; letter-spacing:.12em; opacity:.5; margin:12px 0 7px; }
.sec:first-child { margin-top:0; }
hr { border:none; border-top:1px solid var(--border); margin:10px 0; }

select, input[type=range] {
    width:100%; padding:7px 10px; border-radius:7px;
    background:rgba(0,0,0,0.38); border:1px solid var(--border);
    color:#fff; font-size:13px; outline:none; cursor:pointer;
}
select option { background:#13131e; }

.g2 { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; }

.btn {
    padding:8px 4px; border:1px solid var(--border); border-radius:8px;
    cursor:pointer; background:rgba(255,255,255,0.07); color:#fff;
    font-size:11.5px; transition:.16s; text-align:center; line-height:1.35;
}
.btn:hover { background:rgba(255,255,255,0.15); }
.btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }
.btn.full { grid-column:1/-1; font-size:13px; }

.vol-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
.vol-row span { font-size:11px; opacity:.5; }
.hint { font-size:10.5px; opacity:.45; margin-top:5px; text-align:center; min-height:13px; }
</style>
</head>
<body>

<canvas id="atm-canvas"></canvas>
<div id="bg-overlay"></div>

<div class="clock-container">
  <div class="clock face-tactical" id="clockFace">
    <div id="marks"></div>
    <label style="--i:1"><span>1</span></label><label style="--i:2"><span>2</span></label>
    <label style="--i:3"><span>3</span></label><label style="--i:4"><span>4</span></label>
    <label style="--i:5"><span>5</span></label><label style="--i:6"><span>6</span></label>
    <label style="--i:7"><span>7</span></label><label style="--i:8"><span>8</span></label>
    <label style="--i:9"><span>9</span></label><label style="--i:10"><span>10</span></label>
    <label style="--i:11"><span>11</span></label><label style="--i:12"><span>12</span></label>
    <div class="hand hour-hand" id="hour"></div>
    <div class="hand min-hand"  id="min"></div>
    <div class="hand sec-hand"  id="sec"></div>
    <div class="center-dot"></div>
  </div>
</div>

<div class="side-panel">

  <div class="sec">Clock Size</div>
  <input type="range" id="sizeSlider" min="200" max="600" value="350">

  <div class="sec">Atmosphere Scene</div>
  <select id="atmSelect">
    <option value="none">⬛ None</option>
    <optgroup label="Rain">
      <option value="rain-window">🪟 Rain on Window Glass</option>
      <option value="rain-night">🌃 Rainy Night City</option>
      <option value="rain-forest">🌿 Forest Rain</option>
      <option value="rain-heavy">⛈ Heavy Thunderstorm</option>
    </optgroup>
    <optgroup label="Snow">
      <option value="snow-cabin">🏠 Snowy Cabin Night</option>
      <option value="snow-blizzard">❄️ Blizzard</option>
    </optgroup>
    <optgroup label="Sky & Space">
      <option value="night-mountain">🏔 Night Mountain</option>
      <option value="deep-space">🌌 Deep Space Nebula</option>
      <option value="aurora">🌠 Aurora Borealis</option>
      <option value="sunset">🌅 Sunset Horizon</option>
    </optgroup>
    <optgroup label="Cozy">
      <option value="fireplace">🔥 Fireplace Glow</option>
      <option value="cafe">☕ Cozy Café Window</option>
    </optgroup>
  </select>

  <div class="sec">Particles</div>
  <div class="g2">
    <button class="btn active" id="btn-particles" onclick="toggleParticles(this)">🌨 Particles On</button>
    <button class="btn" onclick="openYT('mPZkdNFkNps',this)">🪟 Rain Window YT</button>
  </div>

  <hr>
  <div class="sec">Ambient Sound <span style="opacity:.4">(offline)</span></div>
  <div class="g2">
    <button class="btn" id="snd-rain"    onclick="toggleSound('rain',this)">🌧 Rain</button>
    <button class="btn" id="snd-fire"    onclick="toggleSound('fire',this)">🔥 Fireplace</button>
    <button class="btn" id="snd-wind"    onclick="toggleSound('wind',this)">💨 Wind</button>
    <button class="btn" id="snd-thunder" onclick="toggleSound('thunder',this)">⛈ Thunder</button>
  </div>
  <div class="vol-row"><span>Vol</span><input type="range" id="soundVol" min="0" max="100" value="50"></div>
  <div class="hint" id="snd-hint"></div>

  <hr>
  <div class="sec">Rain & Relax Videos <span style="opacity:.4">(new tab)</span></div>
  <div class="g2">
    <button class="btn" onclick="openYT('mPZkdNFkNps',this)">🪟 Rain on Window</button>
    <button class="btn" onclick="openYT('q76bMs-NwI4',this)">🌧 Rain &amp; Jazz Café</button>
    <button class="btn" onclick="openYT('1ZYbU82GVz4',this)">❄️ Snowy Cabin</button>
    <button class="btn" onclick="openYT('lTRiuFIWV54',this)">🔥 Fireplace 4K</button>
    <button class="btn" onclick="openYT('jfKfPfyJRdk',this)">🎵 Lofi Girl</button>
    <button class="btn" onclick="openYT('4xDzrJKXOOY',this)">🌊 Synthwave</button>
  </div>
  <div class="hint" id="yt-hint"></div>

  <hr>
  <div class="sec">Clock Style</div>
  <select id="styleSelect">
    <option value="face-tactical">Tactical (Blue / Green)</option>
    <option value="face-minimal">Minimalist White</option>
    <option value="face-classic">Classic Dark</option>
  </select>

  <hr>
  <button class="btn full" id="fsBtn" onclick="toggleFullscreen()">⛶ Enter Fullscreen</button>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════════════
const hourHand=document.getElementById('hour');
const minHand =document.getElementById('min');
const secHand =document.getElementById('sec');
const marksEl =document.getElementById('marks');
const clockFace=document.getElementById('clockFace');

function buildMarks(){
    marksEl.innerHTML='';
    for(let i=1;i<=60;i++){const m=document.createElement('div');m.className='dot';m.style.setProperty('--i',i);marksEl.appendChild(m);}
}
buildMarks();

function tickClock(){
    const n=new Date(),s=n.getSeconds(),m=n.getMinutes(),h=n.getHours();
    secHand.style.transform =`translateX(-50%) rotate(${(s/60)*360}deg)`;
    minHand.style.transform =`translateX(-50%) rotate(${(m/60)*360+(s/60)*6}deg)`;
    hourHand.style.transform=`translateX(-50%) rotate(${((h%12)/12)*360+(m/60)*30}deg)`;
}
setInterval(tickClock,1000); tickClock();

document.getElementById('sizeSlider').oninput=e=>
    document.documentElement.style.setProperty('--clock-size',e.target.value+'px');

document.getElementById('styleSelect').onchange=e=>{
    clockFace.className='clock '+e.target.value; buildMarks();
    const s=e.target.value;
    hourHand.style.background=s==='face-minimal'?'rgba(255,255,255,0.9)':s==='face-classic'?'#f5f5dc':'#3b82f6';
    minHand.style.background =s==='face-minimal'?'rgba(255,255,255,0.6)':s==='face-classic'?'#d4a017':'#4ade80';
    secHand.style.background =s==='face-classic'?'#e74c3c':'#fbbf24';
};

// ══════════════════════════════════════════════════════
//  CANVAS ATMOSPHERE ENGINE
// ══════════════════════════════════════════════════════
const canvas=document.getElementById('atm-canvas');
const ctx=canvas.getContext('2d');
let W,H,animId,currentAtm='none',particlesOn=true;
let particles=[];
let staticCache=null; // off-screen canvas for static bg layers
let frameCount=0;

function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
    staticCache=null; // invalidate
    initAtm(currentAtm);
}
window.addEventListener('resize',resize);

// ── static background renderer (drawn to off-screen canvas once) ──
function buildStaticBg(atm){
    const oc=document.createElement('canvas');
    oc.width=W; oc.height=H;
    const c=oc.getContext('2d');
    renderStaticBg(c,atm);
    return oc;
}

function grad(c,x0,y0,x1,y1,stops){
    const g=c.createLinearGradient(x0,y0,x1,y1);
    stops.forEach(([t,col])=>g.addColorStop(t,col));
    return g;
}
function rgrad(c,cx,cy,r0,r1,stops){
    const g=c.createRadialGradient(cx,cy,r0,cx,cy,r1);
    stops.forEach(([t,col])=>g.addColorStop(t,col));
    return g;
}

function renderStaticBg(c,atm){
    const w=c.canvas.width, h=c.canvas.height;
    switch(atm){

      case 'none':
        c.fillStyle='#050508'; c.fillRect(0,0,w,h); break;

      case 'rain-window': {
        // Dark exterior with blurred city colour
        c.fillStyle=grad(c,0,0,0,h,[[0,'#050a14'],[.5,'#0c1520'],[1,'#080d18']]); c.fillRect(0,0,w,h);
        // colour-bleed bokeh city lights
        [
          [w*.12,h*.62,150,'#f59e0b',.055],[w*.38,h*.72,110,'#3b82f6',.045],
          [w*.58,h*.58,130,'#ef4444',.045],[w*.8,h*.67,100,'#a78bfa',.04],
          [w*.28,h*.82,80,'#fbbf24',.035],[w*.7,h*.78,70,'#34d399',.03],
          [w*.92,h*.5,90,'#f472b6',.03],[w*.05,h*.45,60,'#60a5fa',.025],
        ].forEach(([bx,by,br,col,ba])=>bokeh(c,bx,by,br,col,ba));
        // subtle window-glass tint
        c.fillStyle='rgba(120,160,210,0.025)'; c.fillRect(0,0,w,h);
        break;
      }

      case 'rain-night': {
        c.fillStyle=grad(c,0,0,0,h,[[0,'#03060e'],[.55,'#0a1525'],[1,'#120808']]); c.fillRect(0,0,w,h);
        drawCityline(c,w,h);
        // puddle reflection at bottom
        const pg=c.createLinearGradient(0,h*.78,0,h);
        pg.addColorStop(0,'rgba(30,50,80,.0)'); pg.addColorStop(1,'rgba(20,35,60,.18)');
        c.fillStyle=pg; c.fillRect(0,h*.78,w,h*.22);
        break;
      }

      case 'rain-forest': {
        c.fillStyle=grad(c,0,0,0,h,[[0,'#020802'],[.4,'#071407'],[1,'#030a03']]); c.fillRect(0,0,w,h);
        drawTrees(c,w,h,'rgba(4,12,4,0.95)',h*.72);
        // mist
        const mg=c.createLinearGradient(0,h*.65,0,h*.82);
        mg.addColorStop(0,'rgba(100,140,100,0)'); mg.addColorStop(.5,'rgba(80,110,80,.08)'); mg.addColorStop(1,'rgba(60,90,60,0)');
        c.fillStyle=mg; c.fillRect(0,h*.65,w,h*.2);
        break;
      }

      case 'rain-heavy': {
        c.fillStyle=grad(c,0,0,0,h,[[0,'#020408'],[1,'#080e1a']]); c.fillRect(0,0,w,h);
        break;
      }

      case 'snow-cabin': {
        c.fillStyle=grad(c,0,0,0,h,[[0,'#07101e'],[.5,'#0f1e35'],[1,'#06090f']]); c.fillRect(0,0,w,h);
        drawStarsC(c,w,h,160);
        // horizon glow (moon)
        const moon=rgrad(c,w*.75,h*.15,0,90,[[0,'rgba(230,240,255,.18)'],[1,'rgba(200,220,255,0)']]);
        c.fillStyle=moon; c.fillRect(0,0,w,h);
        drawSnowGround(c,w,h);
        drawCabin(c,w,h);
        break;
      }

      case 'snow-blizzard': {
        c.fillStyle=grad(c,0,0,0,h,[[0,'#080c16'],[1,'#121a28']]); c.fillRect(0,0,w,h);
        break;
      }

      case 'night-mountain': {
        c.fillStyle=grad(c,0,0,0,h,[[0,'#010205'],[.3,'#06102a'],[.65,'#120b35'],[1,'#030305']]); c.fillRect(0,0,w,h);
        // milky way band
        const mw=c.createLinearGradient(w*.05,0,w*.9,h*.55);
        mw.addColorStop(0,'rgba(80,50,160,0)'); mw.addColorStop(.5,'rgba(100,70,200,.07)'); mw.addColorStop(1,'rgba(60,40,140,0)');
        c.fillStyle=mw; c.fillRect(0,0,w,h);
        drawStarsC(c,w,h,220);
        drawMountains(c,w,h);
        break;
      }

      case 'deep-space': {
        c.fillStyle='#010106'; c.fillRect(0,0,w,h);
        // nebula clouds
        [
          [w*.22,h*.32,w*.4,'#5b21b6',.07],[w*.62,h*.22,w*.32,'#0e7490',.07],
          [w*.5, h*.62,w*.28,'#9d174d',.06],[w*.8, h*.5, w*.22,'#1d4ed8',.05],
        ].forEach(([cx,cy,r,col,a])=>nebulaCloud(c,cx,cy,r,col,a));
        drawStarsC(c,w,h,260);
        break;
      }

      case 'aurora': {
        c.fillStyle=grad(c,0,0,0,h,[[0,'#010204'],[.5,'#011410'],[1,'#02030e']]); c.fillRect(0,0,w,h);
        drawStarsC(c,w,h,130);
        // aurora curtains
        [
          {y:h*.28,col:'rgba(0,255,140,.10)',w:h*.35},
          {y:h*.38,col:'rgba(0,200,255,.08)',w:h*.22},
          {y:h*.20,col:'rgba(140,0,255,.06)',w:h*.45},
          {y:h*.50,col:'rgba(0,255,100,.05)',w:h*.18},
        ].forEach(b=>{
          const ag=c.createLinearGradient(0,b.y-b.w/2,0,b.y+b.w/2);
          ag.addColorStop(0,'rgba(0,0,0,0)'); ag.addColorStop(.5,b.col); ag.addColorStop(1,'rgba(0,0,0,0)');
          c.fillStyle=ag; c.fillRect(0,b.y-b.w/2,w,b.w);
        });
        break;
      }

      case 'sunset': {
        c.fillStyle=grad(c,0,0,0,h,[
          [0,'#06000f'],[.28,'#5a0c18'],[.5,'#c44220'],[.68,'#e87b30'],[.82,'#f2b455'],[1,'#100500']
        ]); c.fillRect(0,0,w,h);
        // sun
        const sx=w*.5,sy=h*.54;
        [120,.15, 60,.3, 20,.55].forEach(([r,a])=>{
          const sg=rgrad(c,sx,sy,0,r,[[0,`rgba(255,240,160,${a})`],[1,'rgba(255,180,40,0)']]);
          c.fillStyle=sg; c.beginPath(); c.arc(sx,sy,r,0,Math.PI*2); c.fill();
        });
        // horizon glow
        const hg=rgrad(c,w/2,h*.55,0,w*.7,[[0,'rgba(240,120,20,.13)'],[1,'rgba(200,60,0,0)']]);
        c.fillStyle=hg; c.fillRect(0,0,w,h);
        drawTrees(c,w,h,'rgba(4,2,0,.97)',h*.7);
        break;
      }

      case 'fireplace': {
        c.fillStyle=rgrad(c,w/2,h,0,h,[[0,'#2e1000'],[.35,'#140600'],[1,'#030100']]);
        c.fillRect(0,0,w,h);
        // glow
        const fg=rgrad(c,w/2,h*.85,0,h*.6,[[0,'rgba(255,100,5,.22)'],[.5,'rgba(200,50,5,.09)'],[1,'rgba(0,0,0,0)']]);
        c.fillStyle=fg; c.fillRect(0,0,w,h);
        // arch sides (stone mantle)
        c.fillStyle='rgba(8,4,1,.97)';
        c.fillRect(0,0,w*.25,h); c.fillRect(w*.75,0,w*.25,h);
        c.beginPath(); c.arc(w/2,h*.5,w*.25,Math.PI,0); c.lineTo(w*.75,h); c.lineTo(w*.25,h); c.closePath(); c.fill();
        // mantle shelf
        c.fillRect(w*.22,h*.48,w*.56,h*.06);
        break;
      }

      case 'cafe': {
        c.fillStyle=grad(c,0,0,0,h,[[0,'#0b0703'],[.5,'#160e05'],[1,'#080502']]); c.fillRect(0,0,w,h);
        // window frame
        const fx=w*.12,fy=h*.1,fw=w*.55,fh=h*.65;
        c.fillStyle='rgba(40,22,8,.95)';
        c.fillRect(fx-10,fy-10,fw+20,fh+20);
        c.fillStyle='rgba(180,210,255,.04)'; c.fillRect(fx,fy,fw,fh);
        // bokeh through glass
        bokeh(c,fx+fw*.25,fy+fh*.4,80,'#f59e0b',.07);
        bokeh(c,fx+fw*.55,fy+fh*.6,60,'#3b82f6',.05);
        bokeh(c,fx+fw*.7, fy+fh*.3,50,'#fbbf24',.05);
        // pane dividers
        c.strokeStyle='rgba(40,22,8,1)'; c.lineWidth=8;
        c.beginPath(); c.moveTo(fx,fy+fh*.45); c.lineTo(fx+fw,fy+fh*.45); c.stroke();
        c.beginPath(); c.moveTo(fx+fw*.48,fy); c.lineTo(fx+fw*.48,fy+fh); c.stroke();
        // coffee cup silhouette
        c.fillStyle='rgba(10,6,2,.92)';
        const cx2=w*.78,cy2=h*.72;
        c.beginPath(); c.moveTo(cx2-22,cy2-20); c.lineTo(cx2-16,cy2+10); c.lineTo(cx2+16,cy2+10); c.lineTo(cx2+22,cy2-20); c.closePath(); c.fill();
        c.beginPath(); c.ellipse(cx2,cy2+10,18,5,0,0,Math.PI*2); c.fill();
        // saucer
        c.beginPath(); c.ellipse(cx2,cy2+14,26,6,0,0,Math.PI); c.fill();
        // steam
        for(let i=0;i<3;i++){
          c.beginPath(); c.moveTo(cx2-8+i*8,cy2-22);
          c.bezierCurveTo(cx2-12+i*8,cy2-32,cx2-4+i*8,cy2-38,cx2-8+i*8,cy2-48);
          c.strokeStyle=`rgba(200,180,160,0.08)`; c.lineWidth=2; c.stroke();
        }
        break;
      }
    }
}

// ── drawing helpers ──
function bokeh(c,x,y,r,hex,a){
    const rr=parseInt(hex.slice(1,3),16),gg=parseInt(hex.slice(3,5),16),bb=parseInt(hex.slice(5,7),16);
    const g=c.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,`rgba(${rr},${gg},${bb},${a*3.5})`); g.addColorStop(1,`rgba(${rr},${gg},${bb},0)`);
    c.fillStyle=g; c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fill();
}

function nebulaCloud(c,cx,cy,r,hex,a){
    const rr=parseInt(hex.slice(1,3),16),gg=parseInt(hex.slice(3,5),16),bb=parseInt(hex.slice(5,7),16);
    const g=c.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,`rgba(${rr},${gg},${bb},${a})`); g.addColorStop(1,`rgba(${rr},${gg},${bb},0)`);
    c.fillStyle=g; c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.fill();
}

function drawStarsC(c,w,h,n){
    for(let i=0;i<n;i++){
        const x=Math.random()*w,y=Math.random()*h*.78,r=Math.random()*1.4+.1,a=.35+Math.random()*.65;
        c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fillStyle=`rgba(255,255,255,${a})`; c.fill();
    }
}

function drawMountains(c,w,h){
    c.fillStyle='rgba(12,16,36,.92)';
    c.beginPath(); c.moveTo(0,h);
    [0,.85,.12,.52,.22,.68,.32,.42,.44,.58,.56,.40,.66,.55,.76,.36,.88,.60,.98,.48,1,.72].forEach((v,i,a)=>{if(i%2===0)c.lineTo(a[i]*w,a[i+1]*h);});
    c.lineTo(w,h); c.closePath(); c.fill();

    c.fillStyle='rgba(4,6,14,.96)';
    c.beginPath(); c.moveTo(0,h);
    [0,.92,.08,.76,.18,.84,.28,.64,.38,.78,.5,.58,.62,.72,.72,.56,.82,.68,.94,.60,1,.82].forEach((v,i,a)=>{if(i%2===0)c.lineTo(a[i]*w,a[i+1]*h);});
    c.lineTo(w,h); c.closePath(); c.fill();

    // snow peaks
    c.fillStyle='rgba(200,215,235,.15)';
    [[.32,.42,.04],[.56,.40,.03],[.76,.36,.035]].forEach(([px,py,sz])=>{
        c.beginPath(); c.moveTo(px*w,py*h); c.lineTo((px-.03)*w,(py+.04)*h); c.lineTo((px+.03)*w,(py+.04)*h); c.closePath(); c.fill();
    });
}

function drawTrees(c,w,h,col,treeLine){
    c.fillStyle=col;
    for(let i=0;i<20;i++){
        const x=(i/19)*w,tw=30+Math.sin(i*2.7)*12,th=90+Math.cos(i*2.1)*45;
        // pine silhouette
        c.beginPath();
        c.moveTo(x,treeLine);
        c.lineTo(x-tw*.5,treeLine+th*.32); c.lineTo(x-tw*.36,treeLine+th*.32);
        c.lineTo(x-tw*.55,treeLine+th*.62); c.lineTo(x-tw*.3,treeLine+th*.62);
        c.lineTo(x-tw*.42,treeLine+th); c.lineTo(x+tw*.42,treeLine+th);
        c.lineTo(x+tw*.3,treeLine+th*.62); c.lineTo(x+tw*.55,treeLine+th*.62);
        c.lineTo(x+tw*.36,treeLine+th*.32); c.lineTo(x+tw*.5,treeLine+th*.32);
        c.closePath(); c.fill();
    }
    c.fillRect(0,treeLine+85,w,h);
}

function drawSnowGround(c,w,h){
    const g=c.createLinearGradient(0,h*.76,0,h);
    g.addColorStop(0,'rgba(175,195,218,.65)'); g.addColorStop(1,'rgba(130,155,178,.80)');
    c.fillStyle=g;
    c.beginPath(); c.moveTo(0,h*.82);
    c.bezierCurveTo(w*.2,h*.75,w*.45,h*.80,w*.7,h*.76);
    c.bezierCurveTo(w*.85,h*.73,w*.95,h*.78,w,h*.77);
    c.lineTo(w,h); c.lineTo(0,h); c.closePath(); c.fill();
}

function drawCabin(c,w,h){
    const cx=w*.5, cy=h*.54;
    // body
    c.fillStyle='rgba(25,12,4,.92)'; c.fillRect(cx-65,cy,130,90);
    // door
    c.fillStyle='rgba(15,7,2,.95)'; c.fillRect(cx-14,cy+52,28,38);
    // roof
    c.fillStyle='rgba(18,9,3,.97)';
    c.beginPath(); c.moveTo(cx,cy-60); c.lineTo(cx-90,cy+4); c.lineTo(cx+90,cy+4); c.closePath(); c.fill();
    // snow on roof
    c.fillStyle='rgba(195,215,230,.75)';
    c.beginPath(); c.moveTo(cx,cy-60); c.lineTo(cx-90,cy+4); c.lineTo(cx-84,cy-2); c.lineTo(cx,cy-53); c.lineTo(cx+84,cy-2); c.lineTo(cx+90,cy+4); c.closePath(); c.fill();
    // warm window glow
    const wg=c.createRadialGradient(cx,cy+28,0,cx,cy+28,90);
    wg.addColorStop(0,'rgba(255,185,65,.20)'); wg.addColorStop(1,'rgba(255,140,0,0)');
    c.fillStyle=wg; c.fillRect(cx-100,cy-15,200,160);
    // window panes
    c.fillStyle='rgba(255,205,90,.85)';
    c.fillRect(cx-38,cy+12,28,28); c.fillRect(cx+10,cy+12,28,28);
    // chimney smoke
    for(let i=0;i<5;i++){
        const sr=10+i*4;
        c.beginPath(); c.arc(cx+35,cy-62-i*16,sr,0,Math.PI*2);
        c.fillStyle=`rgba(160,160,175,${.10-i*.018})`; c.fill();
    }
}

function drawCityline(c,w,h){
    for(let i=0;i<24;i++){
        const bx=(i/24)*w, bw=w/24*.82, bh=h*(.22+Math.sin(i*1.9+.8)*.13);
        c.fillStyle='rgba(7,10,20,.96)'; c.fillRect(bx,h-bh,bw,bh);
        // lit windows
        for(let wy=6;wy<bh-6;wy+=13){
            for(let wx=4;wx<bw-4;wx+=9){
                if(Math.random()<.32){
                    const wb=Math.random()>.5;
                    c.fillStyle=wb?`rgba(255,230,140,${.12+Math.random()*.18})`:`rgba(140,180,255,${.08+Math.random()*.14})`;
                    c.fillRect(bx+wx,h-bh+wy,5,7);
                }
            }
        }
    }
    // ground wet reflection
    const rg=c.createLinearGradient(0,h*.82,0,h);
    rg.addColorStop(0,'rgba(20,35,65,0)'); rg.addColorStop(1,'rgba(15,25,50,.22)');
    c.fillStyle=rg; c.fillRect(0,h*.82,w,h*.18);
}

// ── particle constructors ──
function makeRainDrop(atm){
    const heavy=atm==='rain-heavy';
    return {t:'rain',x:Math.random()*W,y:Math.random()*H,
        spd:heavy?22+Math.random()*12:11+Math.random()*8,
        len:heavy?35+Math.random()*25:16+Math.random()*16,
        ang:heavy?.25:.12, al:heavy?.28+Math.random()*.18:.18+Math.random()*.18, lw:heavy?1.5:.8};
}

function makeWindowDrop(){
    return {t:'windrop',x:Math.random()*W,y:-10-Math.random()*40,
        spd:1.6+Math.random()*2.8, al:.45+Math.random()*.4, r:2.5+Math.random()*5.5,
        trail:[], wobble:Math.random()*Math.PI*2, wSpd:.03+Math.random()*.05,
        stopped:false, stopTimer:0};
}

function makeSnow(atm){
    const bliz=atm==='snow-blizzard';
    return {t:'snow',x:Math.random()*W,y:Math.random()*H,
        spd:bliz?4+Math.random()*6:.7+Math.random()*1.6,
        drift:bliz?(Math.random()-.5)*6:(Math.random()-.5)*.9,
        r:bliz?1+Math.random()*3:1.5+Math.random()*4, al:.5+Math.random()*.5,
        sw:Math.random()*Math.PI*2, swSpd:.01+Math.random()*.025};
}

function makeEmber(){
    const ang=-Math.PI/2+(Math.random()-.5)*1.3;
    return {t:'ember',x:W/2+(Math.random()-.5)*100,y:H*.87,
        vx:Math.cos(ang)*(1.2+Math.random()*2.2), vy:Math.sin(ang)*(2+Math.random()*3.5),
        life:1,dec:.005+Math.random()*.013, r:1+Math.random()*2.8,
        col:Math.random()<.55?'255,120,10':'255,60,5'};
}

// ── init particles for atmosphere ──
function initAtm(atm){
    particles=[];
    if(!particlesOn) return;
    if(atm==='rain-window'){ for(let i=0;i<80;i++) particles.push(makeWindowDrop()); }
    else if(atm.startsWith('rain')){ const n=atm==='rain-heavy'?220:100; for(let i=0;i<n;i++) particles.push(makeRainDrop(atm)); }
    if(atm.startsWith('snow')){ const n=atm==='snow-blizzard'?220:70; for(let i=0;i<n;i++) particles.push(makeSnow(atm)); }
    if(atm==='fireplace'){ for(let i=0;i<70;i++) particles.push(makeEmber()); }
    staticCache=buildStaticBg(currentAtm);
}

// ── update + draw particles ──
function stepParticles(){
    particles.forEach(p=>{
        if(p.t==='rain'){
            p.x+=Math.sin(p.ang)*p.spd*.5; p.y+=p.spd;
            if(p.y>H){p.y=-20;p.x=Math.random()*W;}
            ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-Math.sin(p.ang)*p.len,p.y-p.len);
            ctx.strokeStyle=`rgba(180,210,255,${p.al})`; ctx.lineWidth=p.lw; ctx.stroke();
        }
        else if(p.t==='windrop'){
            p.wobble+=p.wSpd;
            if(!p.stopped){
                p.trail.push({x:p.x,y:p.y});
                if(p.trail.length>22) p.trail.shift();
                p.x+=Math.sin(p.wobble)*.9;
                p.y+=p.spd;
                // random stop + dribble restart
                if(Math.random()<.0015){ p.stopped=true; p.stopTimer=40+Math.floor(Math.random()*80); }
            } else {
                p.stopTimer--;
                if(p.stopTimer<=0){ p.stopped=false; }
            }
            if(p.trail.length>2){
                ctx.beginPath(); ctx.moveTo(p.trail[0].x,p.trail[0].y);
                for(let i=1;i<p.trail.length;i++) ctx.lineTo(p.trail[i].x,p.trail[i].y);
                ctx.strokeStyle=`rgba(140,185,240,${p.al*.38})`; ctx.lineWidth=p.r*.65; ctx.stroke();
            }
            // drop blob
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(170,210,255,${p.al*.75})`; ctx.fill();
            // glint
            ctx.beginPath(); ctx.arc(p.x-p.r*.3,p.y-p.r*.3,p.r*.35,0,Math.PI*2);
            ctx.fillStyle=`rgba(255,255,255,${p.al*.55})`; ctx.fill();
            if(p.y>H+30){ Object.assign(p,makeWindowDrop()); }
        }
        else if(p.t==='snow'){
            p.sw+=p.swSpd; p.x+=p.drift+Math.sin(p.sw)*.6; p.y+=p.spd;
            if(p.y>H+10||p.x<-20||p.x>W+20){p.x=Math.random()*W;p.y=-10;}
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(220,235,255,${p.al})`; ctx.fill();
            const sg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.8);
            sg.addColorStop(0,`rgba(200,220,255,${p.al*.28})`); sg.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*2.8,0,Math.PI*2); ctx.fill();
        }
        else if(p.t==='ember'){
            p.x+=p.vx; p.y+=p.vy; p.vy-=.05; p.vx*=.985; p.life-=p.dec;
            if(p.life<=0){ Object.assign(p,makeEmber()); return; }
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
            ctx.fillStyle=`rgba(${p.col},${p.life*.9})`; ctx.fill();
            // glow
            const eg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*p.life*3);
            eg.addColorStop(0,`rgba(${p.col},${p.life*.3})`); eg.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life*3,0,Math.PI*2); ctx.fill();
        }
    });
}

// ── fireplace flame animation ──
let flameT=0;
function drawFlames(){
    if(currentAtm!=='fireplace') return;
    flameT+=.04;
    const fx=W/2, fy=H*.82, fw=W*.22;
    for(let i=0;i<3;i++){
        const off=(i-.5)*fw*.5;
        const fh2=H*(.18+Math.sin(flameT+i*.8)*.04);
        const flm=ctx.createRadialGradient(fx+off,fy,0,fx+off,fy-fh2*.7,fh2);
        flm.addColorStop(0,'rgba(255,240,80,.35)');
        flm.addColorStop(0.3,'rgba(255,140,10,.22)');
        flm.addColorStop(0.7,'rgba(200,50,5,.10)');
        flm.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=flm;
        ctx.beginPath();
        ctx.ellipse(fx+off,fy-fh2*.3,fw*.18+Math.sin(flameT+i)*8,fh2*.55,0,0,Math.PI*2);
        ctx.fill();
    }
}

// ── lightning ──
let flashAlpha=0;
function triggerLightning(){ if(currentAtm==='rain-heavy'&&Math.random()<.003) flashAlpha=.20; }
function drawFlash(){ if(flashAlpha>.005){ ctx.fillStyle=`rgba(210,230,255,${flashAlpha})`; ctx.fillRect(0,0,W,H); flashAlpha*=.65; } }

// ── aurora shimmer ──
let auroraT=0;
function drawAuroraShimmer(){
    if(currentAtm!=='aurora') return;
    auroraT+=.006;
    const bands=[
        {y:H*.28,col:'rgba(0,255,140',w:H*.32,phase:0},
        {y:H*.38,col:'rgba(0,200,255',w:H*.20,phase:1.2},
        {y:H*.20,col:'rgba(130,0,255',w:H*.42,phase:2.4},
    ];
    bands.forEach(b=>{
        const a=.07+Math.sin(auroraT+b.phase)*.035;
        const ag=ctx.createLinearGradient(0,b.y-b.w/2,0,b.y+b.w/2);
        ag.addColorStop(0,'rgba(0,0,0,0)'); ag.addColorStop(.5,`${b.col},${a})`); ag.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=ag; ctx.fillRect(0,b.y-b.w/2,W,b.w);
    });
}

// ── fireplace flicker overlay ──
let flickerT=0;
function drawFireFlicker(){
    if(currentAtm!=='fireplace') return;
    flickerT+=.07;
    const flick=.05+Math.abs(Math.sin(flickerT))*.08;
    const fg=ctx.createRadialGradient(W/2,H,0,W/2,H*.6,H*.5);
    fg.addColorStop(0,`rgba(255,100,5,${flick})`); fg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=fg; ctx.fillRect(0,0,W,H);
}

// ── main loop ──
function animate(){
    animId=requestAnimationFrame(animate);
    frameCount++;
    // draw static bg
    if(staticCache) ctx.drawImage(staticCache,0,0);
    else { ctx.fillStyle='#050508'; ctx.fillRect(0,0,W,H); }
    // dynamic overlays
    drawAuroraShimmer();
    drawFireFlicker();
    drawFlames();
    if(particlesOn) stepParticles();
    drawFlash(); triggerLightning();
}

function initAtmosphere(atm){
    currentAtm=atm; staticCache=null;
    staticCache=buildStaticBg(atm);
    initAtm(atm);
}

resize(); cancelAnimationFrame(animId); animate();

document.getElementById('atmSelect').onchange=e=>initAtmosphere(e.target.value);

function toggleParticles(btn){
    particlesOn=!particlesOn;
    btn.textContent=particlesOn?'🌨 Particles On':'🌫 Particles Off';
    btn.classList.toggle('active',particlesOn);
    if(particlesOn) initAtm(currentAtm); else particles=[];
}

// ══════════════════════════════════════════════════════
//  AMBIENT SOUND (Web Audio — fully offline)
// ══════════════════════════════════════════════════════
let AC=null,soundNodes={},activeSound=null;
function getAC(){ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); return AC; }
function mkNoise(ac,sec=3){ const b=ac.createBuffer(1,ac.sampleRate*sec,ac.sampleRate),d=b.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; return b; }
function vol(){ return document.getElementById('soundVol').value/100; }

const SOUNDS={
    rain:{v:.65,label:'🌧 Rain sound playing',
        make(ac,g){ const s=ac.createBufferSource(); s.buffer=mkNoise(ac,4); s.loop=true;
            const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=700; bp.Q.value=.6;
            const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2200;
            s.connect(bp); bp.connect(lp); lp.connect(g); s.start(); return [s]; }},
    fire:{v:.5,label:'🔥 Fireplace crackling',
        make(ac,g){ return [[70,1.2,.55],[175,.8,.3],[420,.4,.18]].map(([f,q,gv])=>{
            const s=ac.createBufferSource(); s.buffer=mkNoise(ac,3); s.loop=true;
            const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=f; bp.Q.value=q;
            const gn=ac.createGain(); gn.gain.value=gv; s.connect(bp); bp.connect(gn); gn.connect(g); s.start(); return s; }); }},
    wind:{v:.45,label:'💨 Wind howling',
        make(ac,g){ const s=ac.createBufferSource(); s.buffer=mkNoise(ac,5); s.loop=true;
            const hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=180;
            const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=750;
            s.connect(hp); hp.connect(lp); lp.connect(g); s.start(); return [s]; }},
    thunder:{v:.55,label:'⛈ Thunder & storm',
        make(ac,g){ return [[55,.9,.65],[110,.55,.32],[280,.3,.16]].map(([f,q,gv])=>{
            const s=ac.createBufferSource(); s.buffer=mkNoise(ac,4); s.loop=true;
            const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=f; bp.Q.value=q;
            const gn=ac.createGain(); gn.gain.value=gv; s.connect(bp); bp.connect(gn); gn.connect(g); s.start(); return s; }); }},
};

function toggleSound(key,btn){
    const allBtns=['rain','fire','wind','thunder'].map(k=>document.getElementById('snd-'+k));
    const hint=document.getElementById('snd-hint');
    if(activeSound===key){ stopSnd(); allBtns.forEach(b=>b.classList.remove('active')); hint.textContent=''; return; }
    stopSnd(); allBtns.forEach(b=>b.classList.remove('active'));
    const ac=getAC(); if(ac.state==='suspended') ac.resume();
    const master=ac.createGain(); master.gain.value=vol()*SOUNDS[key].v; master.connect(ac.destination);
    const srcs=SOUNDS[key].make(ac,master);
    soundNodes={master,srcs,key};
    activeSound=key; btn.classList.add('active'); hint.textContent=SOUNDS[key].label;
}
function stopSnd(){ if(soundNodes.srcs) soundNodes.srcs.forEach(s=>{try{s.stop();}catch(e){}}); soundNodes={}; activeSound=null; }
document.getElementById('soundVol').oninput=()=>{ if(soundNodes.master) soundNodes.master.gain.value=vol()*(SOUNDS[activeSound]?.v||.5); };

// ══════════════════════════════════════════════════════
//  YOUTUBE (new tab)
// ══════════════════════════════════════════════════════
let activeYT=null;
const ytBtns=[];
function openYT(id,btn){
    const hint=document.getElementById('yt-hint');
    if(activeYT===id){ activeYT=null; btn.classList.remove('active'); hint.textContent=''; return; }
    document.querySelectorAll('.side-panel .btn').forEach(b=>{ if(b._ytId) b.classList.remove('active'); });
    btn._ytId=id; btn.classList.add('active'); activeYT=id;
    hint.textContent='▶ Opening in new tab…';
    window.open('https://www.youtube.com/watch?v='+id,'_blank');
    setTimeout(()=>hint.textContent='♪ Playing in separate tab',1400);
}

// ══════════════════════════════════════════════════════
function toggleFullscreen(){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
}
document.addEventListener('fullscreenchange',()=>{
    const b=document.getElementById('fsBtn');
    if(document.fullscreenElement){b.textContent='✕ Exit Fullscreen';b.classList.add('active');}
    else{b.textContent='⛶ Enter Fullscreen';b.classList.remove('active');}
});
